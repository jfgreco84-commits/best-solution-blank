<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Best Solution | Dot Dynasty LLC</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--card3:#262626;
      --gold:#FFD700;--gold2:#c9a900;--goldbg:rgba(255,215,0,0.08);--goldbd:rgba(255,215,0,0.25);
      --green:#00D26A;--greenbg:rgba(0,210,106,0.08);--greenbd:rgba(0,210,106,0.25);
      --red:#FF4545;--redbg:rgba(255,69,69,0.08);--redbd:rgba(255,69,69,0.25);
      --blue:#4FC3F7;--text:#f0f0f0;--muted:#777;--border:#252525;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;font-size:15px}

    /* HEADER */
    #hdr{background:var(--card);border-bottom:2px solid var(--gold);padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
    .hdr-brand{display:flex;align-items:center;gap:8px}
    .hdr-logo{font-size:22px}
    .hdr-name{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:0.3px}
    .hdr-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:-1px}

    /* BOTTOM NAV */
    #nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;height:58px}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:var(--muted);font-size:8px;font-weight:700;letter-spacing:0.4px;gap:2px;transition:color 0.15s;position:relative}
    .nb .ni{font-size:18px;line-height:1}
    .nb-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:8px;font-weight:900;border-radius:8px;padding:1px 4px;line-height:1.4;min-width:14px;text-align:center}
    .nb.on{color:var(--gold)}

    /* PAGES */
    #pages{position:fixed;top:52px;bottom:58px;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .pg{display:none;padding:12px 12px 16px;min-height:100%}
    .pg.on{display:block}

    /* SECTION LABELS */
    .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin:14px 0 8px}
    .sec-lbl:first-child{margin-top:2px}
    .sec-row{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
    .sec-row .sec-lbl{margin:0}
    .sec-title{font-size:16px;font-weight:900}

    /* CARDS */
    .card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
    .card.gb{border-color:var(--goldbd)}
    .card.grb{border-color:var(--greenbd)}
    .card.rb{border-color:var(--redbd)}
    .card.bb{border-color:rgba(79,195,247,0.3)}

    /* STAT GRIDS */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .sbox{background:var(--card);border-radius:10px;padding:11px 12px;border:1px solid var(--border)}
    .sbox.gb{border-color:var(--goldbd);background:var(--goldbg)}
    .sbox.grb{border-color:var(--greenbd);background:var(--greenbg)}
    .sbox.rb{border-color:var(--redbd);background:var(--redbg)}
    .sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:4px}
    .sv{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
    .sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.w{color:var(--text)}.sv.sm{font-size:16px}
    .ss{font-size:10px;color:var(--muted);margin-top:3px}

    /* PROGRESS BAR */
    .pbar-wrap{background:var(--card3);border-radius:4px;height:7px;overflow:hidden;margin-top:7px}
    .pbar-fill{height:100%;border-radius:4px;transition:width 0.4s}

    /* BUTTONS */
    .btn{padding:11px 16px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.12s,transform 0.1s;letter-spacing:0.2px}
    .btn:active{opacity:0.75;transform:scale(0.97)}.btn:disabled{opacity:0.35;cursor:not-allowed}
    .btn-gold{background:var(--gold);color:#000}.btn-green{background:var(--green);color:#000}
    .btn-red{background:var(--red);color:#fff}.btn-ghost{background:var(--card2);border:1px solid var(--border);color:var(--text)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-sm{padding:8px 13px;font-size:12px;border-radius:7px}.btn-xs{padding:6px 10px;font-size:11px;border-radius:6px}
    .btn-full{width:100%}

    /* INVENTORY TABLE */
    .inv-table{width:100%;border-collapse:collapse}
    .inv-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;padding:0 6px 8px;text-align:right}
    .inv-table th:first-child{text-align:left}
    .inv-table td{padding:8px 6px;border-top:1px solid var(--border);font-size:13px;text-align:right;font-weight:600}
    .inv-table td:first-child{text-align:left}
    .inv-table tr:last-child td{border-bottom:1px solid var(--border)}

    /* SHOW CARDS */
    .sc{background:var(--card);border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid var(--border);cursor:pointer}
    .sc.sa{border-color:var(--goldbd)}.sc.sd{opacity:0.8}
    .sc-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
    .sc-badge.planned{background:var(--card2);color:var(--muted)}
    .sc-badge.active{background:var(--goldbg);color:var(--gold)}
    .sc-badge.completed{background:var(--greenbg);color:var(--green)}
    .sc-name{font-size:17px;font-weight:900}
    .sc-loc{font-size:11px;color:var(--muted);margin-top:2px}
    .sc-stats{display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .sc-s .sv2{font-size:16px;font-weight:900;color:var(--gold)}.sc-s .sl2{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

    /* FORMS */
    .fg{margin-bottom:11px}
    .fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;display:block;font-weight:700}
    .fi{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:16px;outline:none}
    .fi:focus{border-color:var(--gold)}
    textarea.fi{min-height:70px;resize:vertical}

    /* MODAL */
    #mo{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:flex-end;justify-content:center}
    #mo.on{display:flex}
    #mb{background:#181818;border-radius:20px 20px 0 0;padding:18px 14px 28px;width:100%;max-width:560px;max-height:91vh;overflow-y:auto;border-top:2px solid var(--gold)}
    .mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
    .mt{font-size:18px;font-weight:900;color:var(--gold)}
    .mx{background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1;padding:0 4px;margin-top:-4px}

    /* COUNT ROWS */
    .cr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .cr:last-child{border-bottom:none}
    .cr-i{flex:1;min-width:0}
    .cr-n{font-size:14px;font-weight:700}
    .cr-s{font-size:11px;color:var(--muted);margin-top:1px}
    .cr-c{display:flex;align-items:center;gap:7px}
    .crb{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
    .crb:active{background:var(--gold);color:#000;border-color:var(--gold)}
    .cri{width:62px;text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;color:var(--text);font-size:18px;font-weight:900;outline:none}
    .cri:focus{border-color:var(--gold)}

    /* MONEY */
    .mr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .mi{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:18px;font-weight:700;outline:none}
    .mi:focus{border-color:var(--gold)}

    /* SUM ROWS */
    .sr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .sr:last-child{border-bottom:none}
    .srl{font-size:14px;color:var(--muted)}
    .srl.b{color:var(--text);font-weight:800;font-size:15px}
    .srv{font-size:14px;font-weight:700}
    .srv.gold{color:var(--gold)}.srv.green{color:var(--green)}.srv.red{color:var(--red)}.srv.lg{font-size:18px}

    /* CHIPS */
    .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--border)}
    .chip.gold{background:var(--goldbg);color:var(--gold);border-color:var(--goldbd)}
    .chip.green{background:var(--greenbg);color:var(--green);border-color:var(--greenbd)}
    .chip.red{background:var(--redbg);color:var(--red);border-color:var(--redbd)}

    /* DAY TABS */
    .dtabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:13px;scrollbar-width:none}
    .dtabs::-webkit-scrollbar{display:none}
    .dtab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;background:var(--card2);border:1px solid var(--border);color:var(--muted);transition:all 0.12s}
    .dtab.on{background:var(--gold);color:#000;border-color:var(--gold)}
    .dtab.done{border-color:var(--greenbd);color:var(--green)}

    /* STEP */
    .step{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .step:last-child{border-bottom:none}
    .si{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .si.done{background:var(--greenbg)}.si.pend{background:var(--card2)}.si.act{background:var(--goldbg)}
    .sn{font-size:14px;font-weight:800}
    .ss2{font-size:11px;color:var(--muted);margin-top:1px}

    /* WARN BOXES */
    .wb{padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600}
    .wb.red{background:var(--redbg);color:var(--red);border:1px solid var(--redbd)}
    .wb.green{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbd)}
    .wb.gold{background:var(--goldbg);color:var(--gold);border:1px solid var(--goldbd)}

    /* DIVIDER */
    .div{height:1px;background:var(--border);margin:12px 0}

    /* TOAST */
    #toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);color:var(--text);padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;z-index:400;display:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.6)}

    /* HORIZONTAL MINI BAR (payment split) */
    .hbar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin-top:5px;gap:1px}
    .hbar-seg{height:100%;transition:width 0.4s}

    /* EMPTY */
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty .ei{font-size:50px;margin-bottom:12px}

    /* CALENDAR */
    .cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .cal-nav-btn{width:36px;height:36px;border-radius:9px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .cal-nav-btn:active{background:var(--gold);color:#000}
    .cal-title{font-size:18px;font-weight:900;color:var(--gold)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dow{font-size:9px;color:var(--muted);text-align:center;font-weight:800;letter-spacing:1px;padding:6px 0;text-transform:uppercase}
    .cal-cell{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:4px;position:relative;min-height:46px;display:flex;flex-direction:column;cursor:pointer;overflow:hidden}
    .cal-cell.blank{background:transparent;border:none;padding:0;cursor:default}
    .cal-cell.today{border-color:var(--gold);background:var(--goldbg)}
    .cal-cell.has-show{cursor:pointer}
    .cal-cell.confirmed{background:rgba(0,210,106,0.18);border-color:var(--green)}
    .cal-cell.possible{background:rgba(255,215,0,0.16);border-color:var(--gold)}
    .cal-cell.completed{background:rgba(0,210,106,0.30);border-color:var(--green)}
    .cal-cell.conflict{border-color:var(--red)!important;box-shadow:inset 0 0 0 2px rgba(255,60,60,0.75)}
    .cal-num{font-size:11px;font-weight:800;color:var(--text)}
    .cal-cell.today .cal-num{color:var(--gold)}
    .cal-cell.confirmed .cal-num,.cal-cell.completed .cal-num{color:var(--green)}
    .cal-cell.possible .cal-num{color:var(--gold)}
    .cal-show-pill{font-size:8px;font-weight:800;line-height:1.1;margin-top:2px;padding:1px 3px;border-radius:3px;background:rgba(0,0,0,0.35);color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cal-legend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:11px;flex-wrap:wrap}
    .cal-legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}

    /* CONFIRMED BORDERS for show cards */
    .sc.confirmed{border-color:var(--greenbd)}
    .sc.possible{border-color:var(--goldbd);background:rgba(255,215,0,0.04)}

    /* BOOTH PAYMENTS */
    .pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
    .pay-row:last-child{border-bottom:none}
    .pay-amount{font-size:14px;font-weight:900;color:var(--green)}
    .pay-meta{font-size:10px;color:var(--muted)}

    ::-webkit-scrollbar{width:0;height:0}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">⚡</span>
    <div><div class="hdr-name">Best Solution</div><div class="hdr-sub">Dot Dynasty LLC</div></div>
  </div>
  <div id="hdrR"></div>
</div>

<!-- PAGES -->
<div id="pages">
  <div id="pg-home" class="pg on"></div>
  <div id="pg-stock" class="pg"></div>
  <div id="pg-shows" class="pg"></div>
  <div id="pg-reps" class="pg"></div>
  <div id="pg-show" class="pg"></div>
  <div id="pg-calendar" class="pg"></div>
  <div id="pg-supplies" class="pg"></div>
  <div id="pg-pnl" class="pg"></div>
  <div id="pg-settings" class="pg"></div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nb on" id="nb-home" onclick="go('home')"><span class="ni">📊</span>HOME</button>
  <button class="nb" id="nb-stock" onclick="go('stock')"><span class="ni">📦</span>STOCK</button>
  <button class="nb" id="nb-shows" onclick="go('shows')"><span class="ni">🎪</span>SHOWS</button>
  <button class="nb" id="nb-reps" onclick="go('reps')"><span class="ni">👥</span>REPS</button>
  <button class="nb" id="nb-calendar" onclick="go('calendar')"><span class="ni">📅</span>CAL</button>
  <button class="nb" id="nb-supplies" onclick="go('supplies')"><span class="ni">🧴</span>SUPPLY</button>
  <button class="nb" id="nb-pnl" onclick="go('pnl')"><span class="ni">💰</span>P&amp;L</button>
  <button class="nb" id="nb-settings" onclick="go('settings')"><span class="ni">⚙️</span>SETUP</button>
</div>

<!-- MODAL -->
<div id="mo" onclick="mMaybeClose(event)"><div id="mb"></div></div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ===================================================
// CONFIG
// ===================================================
const SKUS=[
  {key:'32oz',name:'32oz Best Solution',short:'32oz',emoji:'🫙',cost:6.00,defP:22.50},
  {key:'16oz',name:'16oz Best Solution',short:'16oz',emoji:'🫙',cost:4.50,defP:15.00},
  {key:'8oz', name:'8oz Best Solution', short:'8oz', emoji:'🧴',cost:4.00,defP:10.00},
  {key:'2oz', name:'2oz Best Solution', short:'2oz', emoji:'🧴',cost:2.25,defP:5.00},
  {key:'c5s', name:'C5 Small (2oz)',    short:'C5-S',emoji:'✨',cost:3.00,defP:10.00},
  {key:'c5l', name:'C5 Large (8oz)',    short:'C5-L',emoji:'✨',cost:6.00,defP:20.00}
];
const PMTS=[
  {key:'cash',   label:'Cash',    icon:'💵',color:'#00D26A'},
  {key:'square', label:'Square',  icon:'⬛',color:'#4FC3F7'},
  {key:'venmo',  label:'Venmo',   icon:'🔵',color:'#3D95CE'},
  {key:'paypal', label:'PayPal',  icon:'🅿️', color:'#003087'},
  {key:'cashapp',label:'Cash App',icon:'💚',color:'#00D632'},
  {key:'zelle',  label:'Zelle',   icon:'🟣',color:'#6D1ED4'}
];
// Commission rates — physical CASH = 35%; card + ALL electronic (Square/Venmo/CashApp/PayPal/Zelle) = 30%
const COMM_CARD = 0.30;
const COMM_CASH = 0.35;
const CASH_COMM_KEYS = ['cash'];
function commRateForKey(key){ return CASH_COMM_KEYS.includes(key) ? COMM_CASH : COMM_CARD; }
const PREV_YEAR={gross:0,cogs:0,booth:0,otherExp:0,net:0,shows:0,bestShow:'',bestProfit:0};
const DEFAULT_SUPPLIES=[
  {id:'sup_bags_lg',   name:'Bags (Large)',      qty:0,low:5, unit:'pk'},
  {id:'sup_bags_sm',   name:'Bags (Small)',       qty:0,low:5, unit:'pk'},
  {id:'sup_ptowels',   name:'Paper Towels',       qty:0,low:2, unit:'roll'},
  {id:'sup_microfiber',name:'Microfiber Cloths',  qty:0,low:4, unit:'ea'},
  {id:'sup_tablecloth',name:'Table Cover',         qty:0,low:1, unit:'ea'},
  {id:'sup_trash',     name:'Trash Bags',          qty:0,low:5, unit:'ea'},
  {id:'sup_tape',      name:'Packing Tape',        qty:0,low:1, unit:'roll'},
  {id:'sup_zipties',   name:'Zip Ties',            qty:0,low:10,unit:'ea'},
  {id:'sup_markers',   name:'Markers',             qty:0,low:2, unit:'ea'},
  {id:'sup_ptags',     name:'Price Tags',          qty:0,low:20,unit:'ea'},
  {id:'sup_cards',     name:'Business Cards',      qty:0,low:50,unit:'ea'},
  {id:'sup_flyers',    name:'Flyers',              qty:0,low:20,unit:'ea'},
  {id:'sup_hsani',     name:'Hand Sanitizer',      qty:0,low:1, unit:'bottle'},
  {id:'sup_candy',     name:'Candy/Mints',         qty:0,low:1, unit:'bag'},
  {id:'sup_change',    name:'Change Bag (Cash)',   qty:0,low:1, unit:'ea'}
];
const INIT={
  v:7,
  inventory:{'32oz':0,'16oz':0,'8oz':0,'2oz':0,'c5s':0,'c5l':0},
  shows:[],
  supplies:JSON.parse(JSON.stringify(DEFAULT_SUPPLIES)),
  productDebt:{supplier:'',originalBalance:0,payments:[]},
  otherExpenses:[],
  prices:{'32oz':22.50,'16oz':15.00,'8oz':10.00,'2oz':5.00,'c5s':10.00,'c5l':20.00},
  settings:{tax:0.28,sqFee:0.03,gasPrice:3.50,mpg:17.5,irsRate:0.70},
  _applied:{}
};

// ===================================================
// STATE
// ===================================================
let S,curPg='home',curShow=null,curDay=0,calMonth=null,showsTab='upcoming';

function normalizeShowDates(d){
  // Always fix startDate from dates[] on every load — no flags, always reliable
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  (d.shows||[]).forEach(sh=>{
    if(sh.dates&&sh.dates[0]){
      const m=sh.dates[0].match(/(\w{3})\s+(\d+)/);
      if(m&&mo[m[1]]){
        const yr=(sh.startDate&&sh.startDate.length>=4)?sh.startDate.substring(0,4):'2026';
        const built=yr+'-'+mo[m[1]]+'-'+String(m[2]).padStart(2,'0');
        sh.startDate=built;
      }
    }
  });
}
function loadS(){
  try{
    // Try v7 first
    let r=localStorage.getItem('dd_bs_blank_v7');
    if(r){const d=JSON.parse(r);if(d.v===INIT.v){applyOneTimeUpdates(d);normalizeShowDates(d);localStorage.setItem('dd_bs_blank_v7',JSON.stringify(d));return d;}}
    // Migrate from v6
    r=localStorage.getItem('dd_bs_blank_v6');
    if(r){
      const d=JSON.parse(r);
      d.v=7;
      d._applied=d._applied||{};
      (d.shows||[]).forEach(sh=>{
        if(!sh.boothPayments)sh.boothPayments=[];
        if(sh.confirmed===undefined)sh.confirmed=sh.status==='completed';
      });
      applyOneTimeUpdates(d);
      normalizeShowDates(d);
      localStorage.setItem('dd_bs_blank_v7',JSON.stringify(d));
      return d;
    }
  }catch(e){console.error('load error',e);}
  const fresh=JSON.parse(JSON.stringify(INIT));
  applyOneTimeUpdates(fresh);
  return fresh;
}

function applyOneTimeUpdates(d){
  // Blank template app: no seeded shows, inventory, or debt.
  d._applied=d._applied||{};
  // One-time DEFENSIVE snapshot before the v8 feature pass. Only ADDS a backup key; never clears live state.
  if(!d._applied['prechange_backup_v8']){
    try{ localStorage.setItem('dd_bs_blank_prechange_v8_'+Date.now(), JSON.stringify(d)); }catch(e){}
    d._applied['prechange_backup_v8']=true;
  }
  // Seed showExpenses array on all shows that don't have it
  if(!d._applied['show_expenses_seed_v1']){
    (d.shows||[]).forEach(sh=>{if(!sh.showExpenses)sh.showExpenses=[];});
    d._applied['show_expenses_seed_v1']=true;
  }
  // Reps system (v8): start with a single "owner" rep; user adds their team in Settings → Team.
  if(!d._applied['reps_seed_v1']){
    if(!d.reps)d.reps=[];
    if(!d.reps.length)d.reps.push({id:'rep_owner',name:'Me (Owner)',isSelf:true,active:true,payments:[]});
    d._applied['reps_seed_v1']=true;
  }
  // Ensure rep fields on shows/days
  if(!d._applied['show_rep_fields_v1']){
    (d.shows||[]).forEach(sh=>{ if(!sh.repIds)sh.repIds=[]; if(sh.repOnlyShow===undefined)sh.repOnlyShow=false; (sh.days||[]).forEach(day=>{ if(!day.repSales)day.repSales=[]; }); });
    d._applied['show_rep_fields_v1']=true;
  }
}

function calcShow(sh){
  let cogs=0,exp=sh.boothCost||0,potential=0;
  (sh.days||[]).forEach(d=>{
    if(d.morningCount&&d.eveningCount){const sold=calcSold(d.morningCount,d.eveningCount);potential+=calcRev(sold);cogs+=calcCOGS(sold);}
    if(d.expenses)exp+=Object.values(d.expenses).reduce((a,b)=>a+(parseFloat(b)||0),0);
  });
  exp+=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
  exp+=(sh.lodging||0);
  const supplyCost=(typeof showSupplyCost==='function')?showSupplyCost(sh):0; // auto bags + manual (0 until costs entered)
  exp+=supplyCost;
  const commissions=calcShowComm(sh); // honors per-show payout overrides; 0 when no reps
  exp+=commissions;
  const gross=(typeof showActualRev==='function')?showActualRev(sh):0; // GROSS = money actually COLLECTED, never units×price
  const profit=gross-cogs-exp;
  const taxRes=Math.max(0,profit)*showTaxRate(sh); // tax reserve = % of NET PROFIT

function calcYTD(){
  let gross=0,cogs=0,expenses=0,units={};
  SKUS.forEach(s=>units[s.key]=0);
  let pmtTotals={cash:0,square:0,venmo:0,paypal:0,cashapp:0,zelle:0};
  let miles=0,gas=0,taxResSum=0;
  // GROSS counts money collected from COMPLETED shows AND completed days of in-progress (active) multi-day shows.
  S.shows.filter(s=>s.status==='completed'||s.status==='active').forEach(sh=>{
    const t=calcShow(sh);gross+=t.gross;cogs+=t.cogs;expenses+=t.expenses;
    taxResSum+=t.taxRes;
    miles+=showMiles(sh);
    gas+=showGas(sh);
    (sh.days||[]).forEach(d=>{
      if(d.morningCount&&d.eveningCount){const sold=calcSold(d.morningCount,d.eveningCount);SKUS.forEach(s=>units[s.key]+=(sold[s.key]||0));}
      if(d.payments)PMTS.forEach(p=>pmtTotals[p.key]+=(parseFloat(d.payments[p.key])||0));
    });
  });
  // Planned/missed shows (not started): only committed booth deposits + logged expenses count as money out
  S.shows.filter(s=>s.status!=='completed'&&s.status!=='active').forEach(sh=>{
    expenses+=boothPaid(sh);
    expenses+=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
    expenses+=(sh.lodging||0);
  });
  // Other expenses: supplies, equipment, misc — logged separately
  const otherSpend=(S.otherExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
  expenses+=otherSpend;
  // True profit = gross minus every dollar that left your pocket
  const profit=gross-cogs-expenses;
  const taxRes=taxResSum;
  const keep=Math.max(0,profit-taxRes);
  const totalUnits=Object.values(units).reduce((a,b)=>a+b,0);
  return{gross,cogs,expenses,profit,taxRes,keep,units,totalUnits,pmtTotals,miles,gas,otherSpend};
}

function boothPaid(sh){return(sh.boothPayments||[]).reduce((t,p)=>t+(parseFloat(p.amount)||0),0);}
function boothBalance(sh){return Math.max(0,(sh.boothCost||0)-boothPaid(sh));}
function calcBoothTally(){
  let paid=0,owed=0,due=0,confirmedCnt=0,possibleCnt=0;
  const paidShows=[],unpaidShows=[];
  S.shows.forEach(sh=>{
    if(sh.status==='completed')return;
    const cost=sh.boothCost||0;const p=boothPaid(sh);
    paid+=p;owed+=cost;due+=Math.max(0,cost-p);
    if(sh.confirmed)confirmedCnt++;else possibleCnt++;
    if(cost>0){
      if(p>=cost-0.01)paidShows.push(sh);
      else unpaidShows.push(sh);
    }
  });
  return{paid,owed,due,confirmedCnt,possibleCnt,paidShows,unpaidShows};
}
function getShowDates(sh){

  if(!sh.startDate)return[];
  const out=[];const s=new Date(sh.startDate+'T12:00:00');

    out.push(d.toISOString().split('T')[0]);
  }

}

}

function showRoundTrips(sh){ return (sh.roundTrips!=null && sh.roundTrips!=='') ? (parseFloat(sh.roundTrips)||0) : (sh.numDays||1); }
function showMpg(sh){ return (sh.mpg!=null && sh.mpg!=='') ? (parseFloat(sh.mpg)||0) : (S.settings.mpg||17.5); }
function showGasPrice(sh){ return (sh.gasPrice!=null && sh.gasPrice!=='') ? (parseFloat(sh.gasPrice)||0) : (S.settings.gasPrice||3.50); }
function showGas(sh){
  if(sh.gasOverride!=null && sh.gasOverride!=='') return parseFloat(sh.gasOverride)||0;
  const mpg=showMpg(sh)||17.5, gp=showGasPrice(sh);
  return (sh.miles||0)*2*showRoundTrips(sh)/mpg*gp;
}
function showMiles(sh){ return (sh.miles||0)*2*showRoundTrips(sh); }
function showTaxRate(sh){ return (sh.taxRate!=null && sh.taxRate!=='') ? (parseFloat(sh.taxRate)||0) : (S.settings.tax||0.28); }
// Card/Square sales = taxable base. Counts only card payments (Square + Debit), NOT cash/Venmo/Zelle/etc.
const CARD_PAY_KEYS=['square','debit'];
function showCardSales(sh){
  let t=0;
  (sh.days||[]).forEach(d=>{ if(d.payments) CARD_PAY_KEYS.forEach(k=>{ t+=parseFloat(d.payments[k])||0; }); });
  return t;
}

// ---- Per-show supplies cost: auto lacy bags by bottle size (1 per unit sold) + manual usage ----
function showAutoSupplyUnits(sh){ const sold=(typeof showUnitsSold==='function')?showUnitsSold(sh):null; const out={}; if(!sold)return out;
  (S.supplies||[]).forEach(sup=>{ if(sup.autoSizes&&sup.autoSizes.length){ let q=0; sup.autoSizes.forEach(k=>q+=(sold[k]||0)); if(q>0)out[sup.name]=(out[sup.name]||0)+q; } }); return out; }
// ---- Lace-bag + flat overhead model (bags $0.20; bottle-bundle driven; C5 rides in the polish bag) ----
function bagUnitCost(){ return (S.settings&&S.settings.bagCost!=null&&S.settings.bagCost!=='')?(parseFloat(S.settings.bagCost)||0):0.20; }
function candyPerShow(){ return (S.settings&&S.settings.candyPerShow!=null&&S.settings.candyPerShow!=='')?(parseFloat(S.settings.candyPerShow)||0):10; }
function paperPerShow(){ return (S.settings&&S.settings.paperPerShow!=null&&S.settings.paperPerShow!=='')?(parseFloat(S.settings.paperPerShow)||0):20; }
function showBagCount(sh){ const u=(typeof showUnitsSold==='function')?showUnitsSold(sh):null; if(!u)return 0;
  return Math.ceil((u['2oz']||0)/2)+(u['8oz']||0)+(u['16oz']||0)+(u['32oz']||0); }
function showBagCost(sh){ return showBagCount(sh)*bagUnitCost(); }
function showFlatOverhead(sh){ return (typeof isMissed==='function'&&isMissed(sh))?0:(candyPerShow()+paperPerShow()); }
function showSupplyCost(sh){
  let cost=0; const auto=showAutoSupplyUnits(sh);
  (S.supplies||[]).forEach(sup=>{ const q=auto[sup.name]||0; if(q>0)cost+=q*(parseFloat(sup.cost)||0); });
  (sh.supplyUse||[]).forEach(u=>{ const sup=(S.supplies||[]).find(s=>s.name===u.name); const c=sup?(parseFloat(sup.cost)||0):(parseFloat(u.cost)||0); cost+=(parseFloat(u.qty)||0)*c; });
  cost+=showBagCost(sh)+showFlatOverhead(sh);
  return cost;
}
function showStaffCount(sh){ const reps=(sh.repIds||[]).filter(id=>{const r=(S.reps||[]).find(x=>x.id===id);return r&&r.active&&!r.isSelf;}).length; return reps + (sh.repOnlyShow?0:1); }
function _hmToMin(t){ if(t==null)return null; t=String(t); if(!/^\d{1,2}:\d{2}$/.test(t))return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
function _minToHM(mins){ mins=((mins%1440)+1440)%1440; const h=Math.floor(mins/60),m=mins%60; const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12; return hh+(m?(':'+String(m).padStart(2,'0')):'')+' '+ap; }
function _dayHasTimes(sh,di){ const d=(sh.days||[])[di]; return !!((d&&(d.openTime||d.closeTime))||sh.openTime||sh.closeTime); }
function dayOpenMin(sh,di){ const d=(sh.days||[])[di]; return _hmToMin(d&&d.openTime) ?? _hmToMin(sh.openTime) ?? 600; }
function dayCloseMin(sh,di){ const d=(sh.days||[])[di]; return _hmToMin(d&&d.closeTime) ?? _hmToMin(sh.closeTime) ?? 960; }
function dayCallClose(sh,di){ const o=dayOpenMin(sh,di),c=dayCloseMin(sh,di); return { call:_minToHM(o-60), open:_minToHM(o), close:_minToHM(c) }; }
function dayWorkHours(sh,di){ if(_dayHasTimes(sh,di)){ const o=dayOpenMin(sh,di),c=dayCloseMin(sh,di); return Math.max(0,(c-o+60)/60); } return parseFloat(sh.hoursPerDay)||8; }

function showWorkHoursTotal(sh){ const n=(sh.numDays||((sh.days||[]).length)||1); let t=0; for(let i=0;i<n;i++)t+=dayWorkHours(sh,i); return t; }
function staffedHours(sh){ return showWorkHoursTotal(sh)*showStaffCount(sh); }
function _bsBlankDay(n,dateStr){ return {dayNum:n,date:dateStr||('Day '+n),morningCount:null,eveningCount:null,payments:{cash:0,square:0,debit:0,venmo:0,zelle:0,cashapp:0,paypal:0},expenses:{gas:0,food:0,parking:0,hotel:0,other:0},repSales:[],notes:'',status:'open'}; }
function _bsDatesFor(startDate,n){ const out=[]; if(startDate){ const s=new Date(startDate+'T12:00:00'); for(let i=0;i<n;i++){ const d=new Date(s); d.setDate(d.getDate()+i); out.push(d.toLocaleDateString('en-US',{month:'short',day:'numeric'})); } } else { for(let i=0;i<n;i++) out.push('Day '+(i+1)); } return out; }
function resizeShowDays(sh,newND){
  sh.days=sh.days||[]; newND=Math.max(1,Math.round(newND)||1);
  if(newND<sh.days.length){ let lastData=0; sh.days.forEach((d,i)=>{ const hasData=d.morningCount||d.eveningCount||(d.payments&&Object.values(d.payments).some(v=>parseFloat(v)>0)); if(hasData)lastData=i+1; }); newND=Math.max(newND,lastData); }
  const dates=_bsDatesFor(sh.startDate,newND);
  if(newND>sh.days.length){ for(let i=sh.days.length;i<newND;i++) sh.days.push(_bsBlankDay(i+1,dates[i])); }
  else if(newND<sh.days.length){ sh.days=sh.days.slice(0,newND); }
  sh.days.forEach((d,i)=>{ if(dates[i])d.date=dates[i]; d.dayNum=i+1; });
  sh.numDays=newND; sh.dates=dates; return newND;
}

function calcBreakEven(sh){
  const gas=showGas(sh);
  const showExp=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
  const flatOverhead=(typeof showFlatOverhead==='function')?showFlatOverhead(sh):0; // candy + paper towels
  const fixedCosts=(sh.boothCost||0)+gas+(sh.lodging||0)+showExp+flatOverhead;
  // Need enough SALES that, after product cost (COGS) and rep commission, fixed costs are covered:
  // BE = fixedCosts / (1 - cogsRate - blendedCommRate)
  const paidRepList=(sh.repIds||[]).map(id=>(S.reps||[]).find(x=>x.id===id)).filter(r=>r&&!r.isSelf&&r.active);
  const cogsRate=0.30;
  if(paidRepList.length){
    const blendedCommRate=paidRepList.reduce((t,r)=>{const rt=repCommRates(r);return t+(0.60*rt.cash+0.40*rt.card);},0)/paidRepList.length;
    const variableRate=cogsRate+blendedCommRate;
    return variableRate>=1?fixedCosts*3:fixedCosts/(1-variableRate);
  }
  return fixedCosts/(1-cogsRate);
}

function rPnL(){
  const y=new Date().getFullYear();

  const taxAmt=ytd.taxRes; // card/Square sales × per-show tax rate (cash excluded)
  const keep=Math.max(0,ytd.profit-taxAmt);
  const qtr=taxAmt/4;
  let boothTotal=0,showExpTotal=0,dayExpTotal=0,lodgingTotal=0;
  S.shows.forEach(sh=>{
    if(sh.status==='completed'){
      boothTotal+=sh.boothCost||0;
      showExpTotal+=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
      lodgingTotal+=sh.lodging||0;

// ===================================================
// INVENTORY TRANSFERS (Change 1) — move packed stock between shows.
// NOT a sale; never touches day counts, payments, revenue, or units-sold.
// ===================================================
function transferableShows(){ return (S.shows||[]).filter(s=>s.status==='active'||s.status==='planned'); }
function openTransferModal(presetFromId){
  const shows=transferableShows();
  if(shows.length<2){ toast('Need 2+ active/planned shows to transfer between'); return; }
  const from=presetFromId&&shows.find(s=>s.id===presetFromId)?presetFromId:shows[0].id;
  const toDefault=(shows.find(s=>s.id!==from)||{}).id;
  const opt=(sel)=>shows.map(s=>`<option value="${s.id}"${s.id===sel?' selected':''}>${s.name}${s.status==='active'?' 🔴':''}</option>`).join('');
  mOpen(`<div class="mh"><div class="mt">🔄 Transfer Stock Between Shows</div><button class="mx" onclick="mClose()">×</button></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Moves packed units from one show to another (e.g. one booth ran out). This is NOT a sale — revenue, units sold, and rep totals are untouched.</div>
  <div class="fg"><label class="fl">Product</label><select class="fi" id="tr_sku">${SKUS.map(s=>`<option value="${s.key}">${s.name}</option>`).join('')}</select></div>
  <div class="fg"><label class="fl">Quantity</label><input class="fi" type="number" id="tr_qty" placeholder="0" min="1" step="1" inputmode="numeric"></div>
  <div class="fg"><label class="fl">From Show</label><select class="fi" id="tr_from">${opt(from)}</select></div>
  <div class="fg"><label class="fl">To Show</label><select class="fi" id="tr_to">${opt(toDefault)}</select></div>
  <button class="btn btn-gold btn-full" onclick="saveTransfer()">✅ Transfer</button>`);
}
function saveTransfer(){
  const sku=$$('tr_sku').value, qty=parseInt($$('tr_qty').value)||0;
  const fromId=$$('tr_from').value, toId=$$('tr_to').value;
  if(qty<=0){toast('Enter a quantity');return;}
  if(fromId===toId){toast('Pick two different shows');return;}
  const from=S.shows.find(s=>s.id===fromId), to=S.shows.find(s=>s.id===toId);
  if(!from||!to){toast('Show not found');return;}
  from.packedInventory=from.packedInventory||{}; to.packedInventory=to.packedInventory||{};
  const avail=from.packedInventory[sku]||0;
  if(qty>avail&&!confirm(`${from.name} only shows ${avail} packed. Transfer anyway?`))return;
  from.packedInventory[sku]=(from.packedInventory[sku]||0)-qty;
  to.packedInventory[sku]=(to.packedInventory[sku]||0)+qty;
  if(!S.transfers)S.transfers=[];
  S.transfers.push({id:'tr_'+Date.now(),ts:new Date().toISOString(),date:new Date().toISOString().split('T')[0],sku,qty,fromShowId:fromId,fromName:from.name,toShowId:toId,toName:to.name});
  mClose();saveS();
  const sName=(SKUS.find(s=>s.key===sku)||{}).short||sku;
  toast(`🔄 Moved ${qty} ${sName}: ${from.name} → ${to.name}`);
}
function delTransfer(id){
  if(!S.transfers)return;
  const tr=S.transfers.find(x=>x.id===id);if(!tr)return;
  if(!confirm('Undo this transfer? Units move back from '+tr.toName+' to '+tr.fromName+'.'))return;
  const from=S.shows.find(s=>s.id===tr.fromShowId), to=S.shows.find(s=>s.id===tr.toShowId);
  if(from){from.packedInventory=from.packedInventory||{};from.packedInventory[tr.sku]=(from.packedInventory[tr.sku]||0)+tr.qty;}
  if(to){to.packedInventory=to.packedInventory||{};to.packedInventory[tr.sku]=(to.packedInventory[tr.sku]||0)-tr.qty;}
  S.transfers=S.transfers.filter(x=>x.id!==id);
  saveS();toast('Transfer undone');
}

// ===================================================
// REPS & COMMISSIONS (ported from main app)
// Cash = 35%; card + all electronic = 30%. Owner (isSelf) earns nothing.
// ===================================================
function _emptyRS(repId){ const o={repId}; PMTS.forEach(p=>o[p.key]=0); return o; }
function repCommRates(rep){ return {
  cash:(rep&&rep.commCash!=null&&rep.commCash!=='')?(parseFloat(rep.commCash)||0):COMM_CASH,
  card:(rep&&rep.commCard!=null&&rep.commCard!=='')?(parseFloat(rep.commCard)||0):COMM_CARD }; }
function calcRepSalesComm(rs){
  const rep=(S.reps||[]).find(r=>r.id===rs.repId);
  if(!rep||rep.isSelf)return 0;
  const rt=repCommRates(rep);
  let cashAmt=0,cardElecAmt=0;
  PMTS.forEach(p=>{const v=parseFloat(rs[p.key])||0; if(CASH_COMM_KEYS.includes(p.key))cashAmt+=v; else cardElecAmt+=v;});
  return cashAmt*rt.cash+cardElecAmt*rt.card;
}
function calcDayComm(day){ return (day.repSales||[]).reduce((t,rs)=>t+calcRepSalesComm(rs),0); }
function repShowCalcComm(sh,repId){ let t=0; (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=calcRepSalesComm(rs); })); return t; }
function repShowComm(sh,repId){ const ov=sh.repPayout&&sh.repPayout[repId]; if(ov!=null&&ov!=='')return parseFloat(ov)||0; return repShowCalcComm(sh,repId); }
function showRepIds(sh){ const ids=new Set(); (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId)ids.add(rs.repId); })); if(sh.repPayout)Object.keys(sh.repPayout).forEach(k=>ids.add(k)); return [...ids]; }
function calcShowComm(sh){ return showRepIds(sh).reduce((t,repId)=>t+repShowComm(sh,repId),0); }
function repShowSales(sh,repId){ let t=0; (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=PMTS.reduce((a,p)=>a+(parseFloat(rs[p.key])||0),0); })); return t; }
function repDayCalcComm(d,repId){ let t=0; (d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=calcRepSalesComm(rs); }); return t; }
function dayCommEffective(sh,di){
  const d=(sh.days||[])[di]; if(!d)return 0; let total=0;
  showRepIds(sh).forEach(repId=>{
    const eff=repShowComm(sh,repId); if(!eff)return;
    const calcTot=repShowCalcComm(sh,repId);
    if(calcTot>0){ total+=eff*(repDayCalcComm(d,repId)/calcTot); return; }
    const days=(sh.days||[]);
    const selling=days.filter(x=>(x.repSales||[]).some(rs=>rs.repId===repId&&PMTS.some(p=>(parseFloat(rs[p.key])||0)>0)));
    const pool=selling.length?selling:days;
    if(pool.indexOf(d)>=0)total+=eff/pool.length;
  });
  return total;
}
function repEarned(repId,shId){ let total=0; (S.shows||[]).forEach(sh=>{ if(shId&&sh.id!==shId)return; total+=repShowComm(sh,repId); }); return total; }
function repPaid(repId,shId){ const rep=(S.reps||[]).find(r=>r.id===repId);if(!rep)return 0; return (rep.payments||[]).filter(p=>!shId||p.showId===shId).reduce((t,p)=>t+(parseFloat(p.amount)||0),0); }
function repOwed(repId,shId){ return Math.max(0,repEarned(repId,shId)-repPaid(repId,shId)); }
function allRepsOwed(){ return (S.reps||[]).filter(r=>!r.isSelf&&r.active).map(r=>({rep:r,earned:repEarned(r.id),paid:repPaid(r.id),owed:repOwed(r.id)})).filter(x=>x.earned>0||x.owed>0); }

// ===================================================
// REPS PAGE (standalone tab) + per-rep profile
// ===================================================
function repWorkedShows(repId){ return (S.shows||[]).filter(sh=>(sh.repIds||[]).includes(repId)||repShowSales(sh,repId)>0||(sh.repPayout&&sh.repPayout[repId]!=null)); }
function rReps(){
  const reps=[...(S.reps||[])].filter(r=>r.active).sort((a,b)=>(b.isSelf?1:0)-(a.isSelf?1:0));
  let h=`<div class="sec-title" style="margin-bottom:4px">👥 Sales Reps</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Tap a rep for their full breakdown — shows worked, sales, and what they're owed.</div>`;
  if(!reps.length){ h+='<div class="empty"><div class="ei">👥</div><div>No reps yet.</div></div>'; }
  reps.forEach(r=>{
    const earned=repEarned(r.id),paid=repPaid(r.id),owed=Math.max(0,earned-paid);
    const worked=repWorkedShows(r.id); let sold=0; worked.forEach(sh=>sold+=repShowSales(sh,r.id));
    h+=`<div class="card" style="margin-bottom:8px;cursor:pointer" onclick="openRepProfile('${r.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:800;font-size:15px">${r.name}${r.isSelf?' 👑':''}</div>
        <div style="font-size:11px;color:var(--muted)">${worked.length} show${worked.length!==1?'s':''} ›</div>
      </div>
      ${r.isSelf?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Owner — paid by show profit, no commission</div>`:`
      <div class="g3" style="margin-top:8px">
        <div style="text-align:center"><div style="font-size:15px;font-weight:900;color:var(--green)">${fmt(sold)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Sold</div></div>
        <div style="text-align:center"><div style="font-size:15px;font-weight:900;color:var(--gold)">${fmt(owed)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Owed</div></div>
        <div style="text-align:center"><div style="font-size:15px;font-weight:900">${fmt(paid)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Paid</div></div>
      </div>`}
    </div>`;
  });
  h+=`<button class="btn btn-gold btn-full" style="margin-top:4px" onclick="openAddRep()">+ Add Rep</button>`;
  pg('reps').innerHTML=h;
}
function openRepProfile(repId){
  const r=(S.reps||[]).find(x=>x.id===repId); if(!r)return;

    <div class="sbox"><div class="sl">PAID</div><div class="sv sm g">${fmt(paid)}</div></div>
    <div class="sbox"><div class="sl">BALANCE OWED</div><div class="sv sm" style="color:var(--gold)">${fmt(owed)}</div></div>
  </div>`}
  <div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:4px">Shows worked (${shows.length})</div>
  ${rows||'<div style="font-size:12px;color:var(--muted)">No shows yet.</div>'}
  ${pays?`<div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin:10px 0 4px">Payments logged</div>${pays}`:''}
  ${!r.isSelf?`<button class="btn btn-gold btn-full" style="margin-top:12px" onclick="mClose();openLogRepPmt('${repId}')">💰 Log Payment to ${r.name}</button>`:''}
  <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="mClose();openEditRep('${repId}')">✏️ Edit Rep &amp; Rates</button>`);

function _csv(v){ if(v==null)v=''; v=String(v); return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function _csvRows(rows){ return rows.map(r=>r.map(_csv).join(',')).join('\r\n'); }
function _stamp(){ return new Date().toISOString().split('T')[0]; }
function dlFile(name,text,mime){
  try{
    const blob=new Blob([text],{type:(mime||'text/csv')+';charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},150);
    toast('📤 Saved '+name);
  }catch(e){ toast('Export failed'); }
}
function _slug(s){ return String(s||'show').replace(/[^a-z0-9]+/gi,'-').toLowerCase().replace(/^-|-$/g,''); }
function exportSeasonCSV(){
  const rows=[['Show','Status','Dates','Location','Days','Potential Gross','Actual Collected','Discounts','COGS','Expenses','Commissions','Net Profit','Tax Reserve']];

    rows.push([sh.name,sh.status,(sh.dates||[]).join(' - '),sh.location||'',sh.numDays||1,showPotentialRev(sh).toFixed(2),showActualRev(sh).toFixed(2),showDiscountTotal(sh).toFixed(2),t.cogs.toFixed(2),t.expenses.toFixed(2),(t.commissions||0).toFixed(2),t.profit.toFixed(2),(t.taxRes||0).toFixed(2)]); });
  const y=calcYTD(); rows.push([]); rows.push(['SEASON TOTAL','','','','','','','',y.cogs.toFixed(2),y.expenses.toFixed(2),(y.totalCommissions||0).toFixed(2),y.profit.toFixed(2),(y.taxRes||0).toFixed(2)]);
  dlFile('best-solution-season-'+_stamp()+'.csv',_csvRows(rows));
}

function rDay(sh,di){
  const d=sh.days[di];if(!d)return'';
  const haM=d.morningCount!==null,haE=d.eveningCount!==null,haP=calcPmt(d.payments)>0;
  const isA=sh.status==='active';
  let sold=null,rev=0,cogs=0;
  if(haM&&haE){sold=calcSold(d.morningCount,d.eveningCount);rev=calcRev(sold);cogs=calcCOGS(sold);}
  const pmtT=calcPmt(d.payments||{});
  const dayExp=Object.values(d.expenses||{}).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const bpd=(sh.boothCost||0)/sh.numDays;
  const dayComm=dayCommEffective(sh,di); // reflects MANUAL payout overrides (split across days)
  const dayLoss=Math.max(0,rev-pmtT); // potential not collected (discounts/freebies/shortfall)
  const profit=pmtT-cogs-dayExp-bpd-dayComm; // net is REAL CASH: money collected minus this day's costs
  const taxRes=Math.max(0,profit*showTaxRate(sh));
  const soldChips=sold?SKUS.filter(s=>(sold[s.key]||0)>0).map(s=>`<span class="chip gold">${s.short}: <strong>${sold[s.key]}</strong></span>`).join(''):'';
  let moneyCheck='';
  if(haP&&rev>0){const diff=Math.abs(pmtT-rev);moneyCheck=diff>0.50?`<div class="wb ${pmtT>rev?'gold':'red'}" style="margin-top:8px">${pmtT>rev?'⚠️ Collected MORE than inventory shows. Check counts.':'⚠️ Missing '+fmt(rev-pmtT)+'. Collected less than inventory.'}</div>`:`<div class="wb green" style="margin-top:8px">✓ Money matches inventory. Good to go.</div>`;}
  return`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:17px;font-weight:900">${d.date||'Day '+(di+1)}</div>
      <span class="chip ${haM&&haE&&haP?'green':isA?'gold':''}">${haM&&haE&&haP?'✓ COMPLETE':isA?'IN PROGRESS':'—'}</span>
    </div>
    <!-- 3-COLUMN COUNTS: Morning | Evening | Money -->
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <div style="flex:1;background:var(--card2);border-radius:8px;padding:8px;border:1px solid ${haM?'var(--border)':'var(--gold)'}">
        <div style="text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;color:#7EB8F7;margin-bottom:6px">🌅 Morning</div>
        ${SKUS.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:var(--muted)">${s.short}</span><span style="font-weight:800">${haM?(d.morningCount[s.key]||0):'—'}</span></div>`).join('')}
        <button class="btn btn-xs ${haM?'btn-ghost':'btn-gold'} btn-full" style="margin-top:8px" onclick="showCntModal('${sh.id}',${di},'morning')">${haM?'Edit':'Count'}</button>
      </div>
      <div style="flex:1;background:var(--card2);border-radius:8px;padding:8px;border:1px solid ${haE?'var(--border)':(haM?'var(--gold)':'var(--border)')}">
        <div style="text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;color:#B98AE6;margin-bottom:6px">🌙 Evening</div>
        ${SKUS.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:var(--muted)">${s.short}</span><span style="font-weight:800">${haE?(d.eveningCount[s.key]||0):'—'}</span></div>`).join('')}
        <button class="btn btn-xs ${haE?'btn-ghost':(haM?'btn-gold':'btn-outline')} btn-full" style="margin-top:8px" onclick="showCntModal('${sh.id}',${di},'evening')" ${!haM?'disabled':''}>${haE?'Edit':'Count'}</button>
      </div>
      <div style="flex:1;background:var(--card2);border-radius:8px;padding:8px;border:1px solid ${haP?'var(--border)':(haE?'var(--gold)':'var(--border)')}">
        <div style="text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;color:#00D26A;margin-bottom:6px">💰 Money</div>
        ${PMTS.map(p=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:var(--muted)">${p.label}</span><span style="font-weight:700">${haP?((d.payments[p.key]||0)>0?fmt(d.payments[p.key]):'—'):''}</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:900;color:var(--green);margin-top:4px"><span>Total</span><span>${haP?fmt(pmtT):'—'}</span></div>
        <button class="btn btn-xs ${haP?'btn-ghost':(haE?'btn-gold':'btn-outline')} btn-full" style="margin-top:6px" onclick="showMoneyModal('${sh.id}',${di})" ${!haE?'disabled':''}>${haP?'Edit':'Count'}</button>
      </div>
    </div>
    ${(soldChips||rev>0||moneyCheck)?`<div style="margin-bottom:6px">
      ${soldChips?`<div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin:2px 0 3px">Sold today</div><div style="display:flex;flex-wrap:wrap;gap:5px">${soldChips}</div>`:''}
      ${rev>0?`<div style="margin-top:4px;font-size:12px;color:var(--muted)">Full-price value: <b style="color:var(--gold)">${fmt(rev)}</b> · collected <b style="color:var(--green)">${fmt(pmtT)}</b></div>`:''}
      ${moneyCheck}
    </div>`:''}
    ${isA?`<div class="div"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px">Day Expenses</div><button class="btn btn-xs btn-ghost" onclick="showExpModal('${sh.id}',${di})">Edit</button></div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      <span class="chip">Gas: <strong>${fmt(d.expenses?.gas||0)}</strong></span>
      <span class="chip">Food: <strong>${fmt(d.expenses?.food||0)}</strong></span>
      <span class="chip">Hotel: <strong>${fmt(d.expenses?.hotel||0)}</strong></span>
      <span class="chip">Other: <strong>${fmt(d.expenses?.other||0)}</strong></span>
    </div>`:''}
    ${haM&&haE?`<div class="div"></div>
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">DAY SUMMARY · REAL CASH</div>
    <div class="sr"><span class="srl">Money Collected</span><span class="srv gold">${fmt(pmtT)}</span></div>
    ${rev>0?`<div class="sr"><span class="srl" style="color:var(--muted)">Potential (full price)</span><span class="srv" style="color:var(--muted)">${fmt(rev)}</span></div>`:''}
    ${dayLoss>0.005?`<div class="sr"><span class="srl">Loss (discounts/freebies)</span><span class="srv red">-${fmt(dayLoss)}</span></div>`:''}
    <div class="sr"><span class="srl">Product Cost (COGS)</span><span class="srv red">-${fmt(cogs)}</span></div>
    <div class="sr"><span class="srl">Day Expenses</span><span class="srv red">-${fmt(dayExp)}</span></div>
    <div class="sr"><span class="srl">Booth Share</span><span class="srv red">-${fmt(bpd)}</span></div>
    ${dayComm>0?`<div class="sr"><span class="srl">Rep Commissions</span><span class="srv red">-${fmt(dayComm)}</span></div>`:''}
    <div class="sr"><span class="srl b">Net Profit (cash)</span><span class="srv lg ${profit>=0?'green':'red'}">${fmt(profit)}</span></div>
    <div class="sr"><span class="srl">Tax Reserve (${Math.round(showTaxRate(sh)*100)}%${(sh.taxRate!=null&&sh.taxRate!=='')?' · show rate':''})</span><span class="srv red">-${fmt(taxRes)}</span></div>

    ${(()=>{
      const showReps=(sh.repIds||[]).filter(id=>{const r=(S.reps||[]).find(x=>x.id===id);return r&&r.active;});
      if(!showReps.length)return'';
      const dc=calcDayComm(d);
      const repRows=showReps.map(repId=>{
        const rep=(S.reps||[]).find(r=>r.id===repId);if(!rep)return'';
        const rs=(d.repSales||[]).find(x=>x.repId===repId)||_emptyRS(repId);

        return`<div style="background:var(--card2);border-radius:8px;padding:10px 12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:800;font-size:13px">${rep.name}${rep.isSelf?' 👑':''}</div><div style="text-align:right"><div style="font-size:13px;font-weight:900;color:var(--gold)">${fmt(repTotal)}</div>${!rep.isSelf&&repComm>0?`<div style="font-size:10px;color:var(--red)">Comm: ${fmt(repComm)}</div>`:''}</div></div><button class="btn btn-xs btn-ghost" style="width:100%" onclick="openRepSalesEntry('${sh.id}',${di},'${repId}')">✏️ Log Sales for ${rep.name}</button></div>`;

function showPackModal(shId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  mOpen(`<div class="mh"><div class="mt">🎒 Pack for ${sh.name}</div><button class="mx" onclick="mClose()">×</button></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">How many are you bringing? Can't exceed master inventory.</div>
  ${SKUS.map(s=>`<div class="cr"><div class="cr-i"><div class="cr-n">${s.name}</div><div class="cr-s">In stock: ${S.inventory[s.key]||0}</div></div>
  <div class="cr-c"><button class="crb" onclick="pkA('${s.key}',-1)">−</button><input class="cri" type="number" id="pk_${s.key}" value="0" min="0" max="${S.inventory[s.key]||0}"><button class="crb" onclick="pkA('${s.key}',1)">+</button></div></div>`).join('')}
  <div style="display:flex;gap:10px;margin-top:12px">
    <button class="btn btn-ghost" style="flex:0 0 auto" onclick="pkAll('${shId}')">Take All</button>

  </div>`);

// ===================================================
// CALENDAR (month grid view)
// ===================================================
function calShift(delta){
  if(!calMonth){const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};}
  let m=calMonth.m+delta,y=calMonth.y;
  if(m<0){m=11;y--;}
  if(m>11){m=0;y++;}
  calMonth={y,m};
  rCalendar();
}
function calToday(){
  const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};
  rCalendar();
}
function rCalendar(){
  if(!calMonth){const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};}
  const y=calMonth.y,m=calMonth.m;
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW=['S','M','T','W','T','F','S'];
  const startDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  const mKey=y+'-'+String(m+1).padStart(2,'0');
  const dayMap={};
  S.shows.forEach(sh=>{getShowDates(sh).forEach(ds=>{(dayMap[ds]=dayMap[ds]||[]).push(sh);});});
  let monthDays=0;
  Object.keys(dayMap).forEach(ds=>{if(ds.substring(0,7)===mKey)monthDays++;});
  let h=`<div class="cal-hdr"><button class="cal-nav-btn" onclick="calShift(-1)">&lsaquo;</button><div class="cal-title">${MN[m]} ${y}</div><button class="cal-nav-btn" onclick="calShift(1)">&rsaquo;</button></div>`;
  h+='<div class="cal-grid">';
  DOW.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++)h+='<div class="cal-cell blank"></div>';
  let conflictDays=0;
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${mKey}-${String(day).padStart(2,'0')}`;
    const shows=dayMap[ds]||[];
    const conflict=shows.length>1;
    if(conflict)conflictDays++;
    let cls='cal-cell',onclick='';
    if(ds===todayStr)cls+=' today';
    if(shows.length){
      let st='possible';
      if(shows.some(s=>s.status==='completed'))st='completed';
      else if(shows.some(s=>s.confirmed||s.status==='active'))st='confirmed';
      cls+=` has-show ${st}`;
      if(conflict)cls+=' conflict';
      onclick=` onclick="go('show','${shows[0].id}')"`;
    }
    h+=`<div class="${cls}"${onclick}><div class="cal-num">${day}${conflict?' <span style="color:var(--red);font-size:10px">⚠️</span>':''}</div>`;
    shows.slice(0,2).forEach(s=>{h+=`<div class="cal-show-pill">${s.name}</div>`;});
    if(shows.length>2)h+=`<div class="cal-show-pill">+${shows.length-2} more</div>`;
    h+='</div>';
  }
  h+='</div>';

function setSt(k,v){S.settings[k]=v;saveS();toast('Saved!');}
function setP(k,v){if(!S.prices)S.prices={};S.prices[k]=v;saveS();}
function applyClaudeCmd(){
  const raw=($$('claudeCmd').value||'').trim().toUpperCase();
  if(!raw){toast('Nothing to apply!');return;}
  try{
    // INVENTORY UPDATE: INV:32oz=80,c5s=400
    if(raw.startsWith('INV:')){
      const parts=raw.replace('INV:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=Math.max(0,val);updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Updated '+updated+' inventory items!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    // ADD INVENTORY: ADD:32oz=10,c5s=50
    if(raw.startsWith('ADD:')){
      const parts=raw.replace('ADD:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=(S.inventory[sku.key]||0)+val;updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Added stock to '+updated+' items!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    // SUBTRACT INVENTORY: SOLD:32oz=5,c5s=10
    if(raw.startsWith('SOLD:')){
      const parts=raw.replace('SOLD:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=Math.max(0,(S.inventory[sku.key]||0)-val);updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Removed sold items from '+updated+' SKUs!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    toast('Unknown command. Start with INV:, ADD:, or SOLD:');
  }catch(e){toast('Command error: '+e.message);}
}

const SHARED_ID='shared';
let sb=null,_cloudTimer=null,_syncState='off';

function syncLabel(st){return {off:'Connecting…',syncing:'Syncing…',synced:'Synced ✓',error:'Offline — will sync later'}[st]||'';}
function setSync(st){_syncState=st;const el=$$('cl_status');if(el)el.textContent=syncLabel(st);}

async function cloudPull(){
  if(!sb)return null;
  try{
    const{data,error}=await sb.from('blank_app_state').select('data').eq('id',SHARED_ID).maybeSingle();
    if(error||!data)return null;
    return data.data;
  }catch(e){console.warn('cloudPull',e);return null;}
}
async function cloudPush(){
  if(!sb)return;
  if(!S._updatedAt)S._updatedAt=new Date().toISOString();
  setSync('syncing');
  try{
    const{error}=await sb.from('blank_app_state').upsert({id:SHARED_ID,data:S,updated_at:new Date().toISOString()},{onConflict:'id'});
    setSync(error?'error':'synced');
    if(error)console.warn('cloudPush',error);
  }catch(e){console.warn('cloudPush',e);setSync('error');}
}
function cloudQueuePush(){
  if(!sb)return;
  clearTimeout(_cloudTimer);
  setSync('syncing');
  _cloudTimer=setTimeout(cloudPush,800);
}
function backupLocal(){
  try{
    const cur=localStorage.getItem('dd_bs_blank_v7');if(!cur)return;
    localStorage.setItem('dd_bs_blank_backup_'+Date.now(),cur);
    const keys=Object.keys(localStorage).filter(k=>k.indexOf('dd_bs_blank_backup_')===0).sort();
    while(keys.length>3)localStorage.removeItem(keys.shift());
  }catch(e){console.warn('backupLocal',e);}
}
function looksUsed(st){
  if(!st||!st.shows)return false;
  if((st.otherExpenses||[]).length)return true;
  return st.shows.some(sh=>sh.status==='completed'||(sh.days||[]).some(d=>d.morningCount!=null||d.eveningCount!=null));
}
function adoptCloud(cloud){
  backupLocal();
  cloud.v=INIT.v;
  localStorage.setItem('dd_bs_blank_v7',JSON.stringify(cloud));
  S=loadS();
  renderCur();
  setSync('synced');
}
async function cloudHydrate(){
  const cloud=await cloudPull();
  if(!cloud){await cloudPush();return;}
  if(!cloud.inventory||!cloud.shows){await cloudPush();return;}
  const localUsed=looksUsed(S),cloudUsed=looksUsed(cloud);
  if(localUsed&&!cloudUsed){await cloudPush();return;}
  if(cloudUsed&&!localUsed){adoptCloud(cloud);return;}
  const localT=S._updatedAt||'',cloudT=cloud._updatedAt||'';
  if(cloudT>localT)adoptCloud(cloud);
  else if(localT>cloudT)await cloudPush();
  else setSync('synced');
}
async function cloudInit(){
  if(!sb)return;
  setSync('syncing');
  await cloudHydrate();
}
async function cloudSyncNow(){
  if(!sb){toast('Sync unavailable - no connection');return;}
  setSync('syncing');
  await cloudHydrate();
  rSettings();
  toast('Synced');
}

}
