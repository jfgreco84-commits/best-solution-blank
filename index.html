<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Best Solution — Batman</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0a0a;--card:#161616;--card2:#1e1e1e;--card3:#262626;
      --gold:#FFD700;--gold2:#c9a900;--goldbg:rgba(255,215,0,0.08);--goldbd:rgba(255,215,0,0.25);
      --green:#00D26A;--greenbg:rgba(0,210,106,0.08);--greenbd:rgba(0,210,106,0.25);
      --red:#FF4545;--redbg:rgba(255,69,69,0.08);--redbd:rgba(255,69,69,0.25);
      --blue:#4FC3F7;--text:#f0f0f0;--muted:#777;--border:#252525;
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;font-size:15px}

    /* HEADER */
    #hdr{background:var(--card);border-bottom:2px solid var(--gold);padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:100;height:52px}
    .hdr-brand{display:flex;align-items:center;gap:8px}
    .hdr-logo{font-size:22px}
    .hdr-name{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:0.3px}
    .hdr-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:-1px}

    /* BOTTOM NAV */
    #nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;height:58px}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:var(--muted);font-size:8px;font-weight:700;letter-spacing:0.4px;gap:2px;transition:color 0.15s;position:relative}
    .nb .ni{font-size:18px;line-height:1}
    .nb-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:8px;font-weight:900;border-radius:8px;padding:1px 4px;line-height:1.4;min-width:14px;text-align:center}
    .nb.on{color:var(--gold)}

    /* PAGES */
    #pages{position:fixed;top:52px;bottom:58px;left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
    .pg{display:none;padding:12px 12px 16px;min-height:100%}
    .pg.on{display:block}

    /* SECTION LABELS */
    .sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;margin:14px 0 8px}
    .sec-lbl:first-child{margin-top:2px}
    .sec-row{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
    .sec-row .sec-lbl{margin:0}
    .sec-title{font-size:16px;font-weight:900}

    /* CARDS */
    .card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
    .card.gb{border-color:var(--goldbd)}
    .card.grb{border-color:var(--greenbd)}
    .card.rb{border-color:var(--redbd)}
    .card.bb{border-color:rgba(79,195,247,0.3)}

    /* STAT GRIDS */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .sbox{background:var(--card);border-radius:10px;padding:11px 12px;border:1px solid var(--border)}
    .sbox.gb{border-color:var(--goldbd);background:var(--goldbg)}
    .sbox.grb{border-color:var(--greenbd);background:var(--greenbg)}
    .sbox.rb{border-color:var(--redbd);background:var(--redbg)}
    .sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:4px}
    .sv{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
    .sv.g{color:var(--green)}.sv.r{color:var(--red)}.sv.w{color:var(--text)}.sv.sm{font-size:16px}
    .ss{font-size:10px;color:var(--muted);margin-top:3px}

    /* PROGRESS BAR */
    .pbar-wrap{background:var(--card3);border-radius:4px;height:7px;overflow:hidden;margin-top:7px}
    .pbar-fill{height:100%;border-radius:4px;transition:width 0.4s}

    /* BUTTONS */
    .btn{padding:11px 16px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.12s,transform 0.1s;letter-spacing:0.2px}
    .btn:active{opacity:0.75;transform:scale(0.97)}.btn:disabled{opacity:0.35;cursor:not-allowed}
    .btn-gold{background:var(--gold);color:#000}.btn-green{background:var(--green);color:#000}
    .btn-red{background:var(--red);color:#fff}.btn-ghost{background:var(--card2);border:1px solid var(--border);color:var(--text)}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .btn-sm{padding:8px 13px;font-size:12px;border-radius:7px}.btn-xs{padding:6px 10px;font-size:11px;border-radius:6px}
    .btn-full{width:100%}

    /* INVENTORY TABLE */
    .inv-table{width:100%;border-collapse:collapse}
    .inv-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;padding:0 6px 8px;text-align:right}
    .inv-table th:first-child{text-align:left}
    .inv-table td{padding:8px 6px;border-top:1px solid var(--border);font-size:13px;text-align:right;font-weight:600}
    .inv-table td:first-child{text-align:left}
    .inv-table tr:last-child td{border-bottom:1px solid var(--border)}

    /* SHOW CARDS */
    .sc{background:var(--card);border-radius:12px;padding:13px;margin-bottom:9px;border:1px solid var(--border);cursor:pointer}
    .sc.sa{border-color:var(--goldbd)}.sc.sd{opacity:0.8}
    .sc-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
    .sc-badge.planned{background:var(--card2);color:var(--muted)}
    .sc-badge.active{background:var(--goldbg);color:var(--gold)}
    .sc-badge.completed{background:var(--greenbg);color:var(--green)}
    .sc-name{font-size:17px;font-weight:900}
    .sc-loc{font-size:11px;color:var(--muted);margin-top:2px}
    .sc-stats{display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .sc-s .sv2{font-size:16px;font-weight:900;color:var(--gold)}.sc-s .sl2{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

    /* FORMS */
    .fg{margin-bottom:11px}
    .fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;display:block;font-weight:700}
    .fi{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-size:16px;outline:none}
    .fi:focus{border-color:var(--gold)}
    textarea.fi{min-height:70px;resize:vertical}

    /* MODAL */
    #mo{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:flex-end;justify-content:center}
    #mo.on{display:flex}
    #mb{background:#181818;border-radius:20px 20px 0 0;padding:18px 14px 28px;width:100%;max-width:560px;max-height:91vh;overflow-y:auto;border-top:2px solid var(--gold)}
    .mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
    .mt{font-size:18px;font-weight:900;color:var(--gold)}
    .mx{background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1;padding:0 4px;margin-top:-4px}

    /* COUNT ROWS */
    .cr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
    .cr:last-child{border-bottom:none}
    .cr-i{flex:1;min-width:0}
    .cr-n{font-size:14px;font-weight:700}
    .cr-s{font-size:11px;color:var(--muted);margin-top:1px}
    .cr-c{display:flex;align-items:center;gap:7px}
    .crb{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300}
    .crb:active{background:var(--gold);color:#000;border-color:var(--gold)}
    .cri{width:62px;text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;color:var(--text);font-size:18px;font-weight:900;outline:none}
    .cri:focus{border-color:var(--gold)}

    /* MONEY */
    .mr{display:flex;align-items:center;gap:10px;margin-bottom:9px}
    .mi{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:18px;font-weight:700;outline:none}
    .mi:focus{border-color:var(--gold)}

    /* SUM ROWS */
    .sr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .sr:last-child{border-bottom:none}
    .srl{font-size:14px;color:var(--muted)}
    .srl.b{color:var(--text);font-weight:800;font-size:15px}
    .srv{font-size:14px;font-weight:700}
    .srv.gold{color:var(--gold)}.srv.green{color:var(--green)}.srv.red{color:var(--red)}.srv.lg{font-size:18px}

    /* CHIPS */
    .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card2);border:1px solid var(--border)}
    .chip.gold{background:var(--goldbg);color:var(--gold);border-color:var(--goldbd)}
    .chip.green{background:var(--greenbg);color:var(--green);border-color:var(--greenbd)}
    .chip.red{background:var(--redbg);color:var(--red);border-color:var(--redbd)}

    /* DAY TABS */
    .dtabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:13px;scrollbar-width:none}
    .dtabs::-webkit-scrollbar{display:none}
    .dtab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;background:var(--card2);border:1px solid var(--border);color:var(--muted);transition:all 0.12s}
    .dtab.on{background:var(--gold);color:#000;border-color:var(--gold)}
    .dtab.done{border-color:var(--greenbd);color:var(--green)}

    /* STEP */
    .step{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .step:last-child{border-bottom:none}
    .si{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .si.done{background:var(--greenbg)}.si.pend{background:var(--card2)}.si.act{background:var(--goldbg)}
    .sn{font-size:14px;font-weight:800}
    .ss2{font-size:11px;color:var(--muted);margin-top:1px}

    /* WARN BOXES */
    .wb{padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600}
    .wb.red{background:var(--redbg);color:var(--red);border:1px solid var(--redbd)}
    .wb.green{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbd)}
    .wb.gold{background:var(--goldbg);color:var(--gold);border:1px solid var(--goldbd)}

    /* DIVIDER */
    .div{height:1px;background:var(--border);margin:12px 0}

    /* TOAST */
    #toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);color:var(--text);padding:8px 18px;border-radius:9px;font-size:13px;font-weight:700;z-index:400;display:none;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.6)}

    /* HORIZONTAL MINI BAR (payment split) */
    .hbar{height:10px;border-radius:5px;overflow:hidden;display:flex;margin-top:5px;gap:1px}
    .hbar-seg{height:100%;transition:width 0.4s}

    /* EMPTY */
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty .ei{font-size:50px;margin-bottom:12px}

    /* CALENDAR */
    .cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .cal-nav-btn{width:36px;height:36px;border-radius:9px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .cal-nav-btn:active{background:var(--gold);color:#000}
    .cal-title{font-size:18px;font-weight:900;color:var(--gold)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dow{font-size:9px;color:var(--muted);text-align:center;font-weight:800;letter-spacing:1px;padding:6px 0;text-transform:uppercase}
    .cal-cell{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:4px;position:relative;min-height:46px;display:flex;flex-direction:column;cursor:pointer;overflow:hidden}
    .cal-cell.blank{background:transparent;border:none;padding:0;cursor:default}
    .cal-cell.today{border-color:var(--gold);background:var(--goldbg)}
    .cal-cell.has-show{cursor:pointer}
    .cal-cell.confirmed{background:rgba(0,210,106,0.18);border-color:var(--green)}
    .cal-cell.possible{background:rgba(255,215,0,0.16);border-color:var(--gold)}
    .cal-cell.completed{background:rgba(0,210,106,0.30);border-color:var(--green)}
    .cal-cell.conflict{border-color:var(--red)!important;box-shadow:inset 0 0 0 2px rgba(255,60,60,0.75)}
    .cal-num{font-size:11px;font-weight:800;color:var(--text)}
    .cal-cell.today .cal-num{color:var(--gold)}
    .cal-cell.confirmed .cal-num,.cal-cell.completed .cal-num{color:var(--green)}
    .cal-cell.possible .cal-num{color:var(--gold)}
    .cal-show-pill{font-size:8px;font-weight:800;line-height:1.1;margin-top:2px;padding:1px 3px;border-radius:3px;background:rgba(0,0,0,0.35);color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .cal-legend{display:flex;gap:14px;justify-content:center;margin-top:12px;font-size:11px;flex-wrap:wrap}
    .cal-legend-dot{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}

    /* CONFIRMED BORDERS for show cards */
    .sc.confirmed{border-color:var(--greenbd)}
    .sc.possible{border-color:var(--goldbd);background:rgba(255,215,0,0.04)}

    /* BOOTH PAYMENTS */
    .pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
    .pay-row:last-child{border-bottom:none}
    .pay-amount{font-size:14px;font-weight:900;color:var(--green)}
    .pay-meta{font-size:10px;color:var(--muted)}

    ::-webkit-scrollbar{width:0;height:0}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-brand">
    <span class="hdr-logo">⚡</span>
    <div><div class="hdr-name">Best Solution</div><div class="hdr-sub">Dot Dynasty LLC</div></div>
  </div>
  <div id="hdrR"></div>
</div>

<!-- PAGES -->
<div id="pages">
  <div id="pg-home" class="pg on"></div>
  <div id="pg-section" class="pg"></div>
  <div id="pg-stock" class="pg"></div>
  <div id="pg-shows" class="pg"></div>
  <div id="pg-reps" class="pg"></div>
  <div id="pg-show" class="pg"></div>
  <div id="pg-calendar" class="pg"></div>
  <div id="pg-supplies" class="pg"></div>
  <div id="pg-pnl" class="pg"></div>
  <div id="pg-settings" class="pg"></div>
</div>

<!-- BOTTOM NAV -->
<div id="nav">
  <button class="nb on" id="nb-home" onclick="go('home')"><span class="ni">📊</span>HOME</button>
  <button class="nb" id="nb-stock" onclick="go('stock')"><span class="ni">📦</span>STOCK</button>
  <button class="nb" id="nb-shows" onclick="go('shows')"><span class="ni">🎪</span>SHOWS</button>
  <button class="nb" id="nb-reps" onclick="go('reps')"><span class="ni">👥</span>REPS</button>
  <button class="nb" id="nb-calendar" onclick="go('calendar')"><span class="ni">📅</span>CAL</button>
  <button class="nb" id="nb-supplies" onclick="go('supplies')"><span class="ni">🧴</span>SUPPLY</button>
  <button class="nb" id="nb-pnl" onclick="go('pnl')"><span class="ni">💰</span>P&amp;L</button>
  <button class="nb" id="nb-settings" onclick="go('settings')"><span class="ni">⚙️</span>SETUP</button>
</div>

<!-- MODAL -->
<div id="mo" onclick="mMaybeClose(event)"><div id="mb"></div></div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ===================================================
// CONFIG
// ===================================================
const SKUS=[
  {key:'32oz',name:'32oz Best Solution',short:'32oz',emoji:'🫙',cost:6.00,defP:22.50},
  {key:'16oz',name:'16oz Best Solution',short:'16oz',emoji:'🫙',cost:4.50,defP:15.00},
  {key:'8oz', name:'8oz Best Solution', short:'8oz', emoji:'🧴',cost:4.00,defP:10.00},
  {key:'2oz', name:'2oz Best Solution', short:'2oz', emoji:'🧴',cost:2.25,defP:5.00},
  {key:'c5s', name:'C5 Small (2oz)',    short:'C5-S',emoji:'✨',cost:3.00,defP:10.00},
  {key:'c5l', name:'C5 Large (8oz)',    short:'C5-L',emoji:'✨',cost:6.00,defP:20.00}
];
// COMM_CARD / COMM_CASH below are the TAX-base rates only (PMTS[].commRate). Do not repurpose for rep commission.
const COMM_CARD = 0.30;
const COMM_CASH = 0.35;
// ----- Rep commission engine (2026 matrix) -----
// Two buckets: DIRECT (cash + Venmo + PayPal + Cash App + Zelle) and CARD (Square + Credit + Debit).
// Per-rep rates live on rep.commCash (DIRECT) and rep.commCard (CARD); blank falls back to DEFAULT_COMM_RATE.
// Matrix: Isaiah 40/40 · Anthony 40 direct / 30 card · everyone else 30/30.
const DEFAULT_COMM_RATE = 0.30;
const CASH_COMM_KEYS = ['cash','venmo','paypal','cashapp','zelle'];
function commRateForKey(key){ return CASH_COMM_KEYS.includes(key) ? DEFAULT_COMM_RATE : DEFAULT_COMM_RATE; } // generic default label only; per-rep uses repRateForMethod()
const PMTS=[
  {key:'cash',   label:'Cash',    icon:'💵',color:'#00D26A', commRate:COMM_CASH},
  {key:'square', label:'Square',  icon:'⬛',color:'#4FC3F7', commRate:COMM_CARD},
  {key:'debit',  label:'Debit',   icon:'💳',color:'#7EC8E3', commRate:COMM_CARD},
  {key:'venmo',  label:'Venmo',   icon:'🔵',color:'#3D95CE', commRate:COMM_CASH},
  {key:'zelle',  label:'Zelle',   icon:'🟣',color:'#6D1ED4', commRate:COMM_CASH},
  {key:'cashapp',label:'Cash App',icon:'💚',color:'#00D632', commRate:COMM_CASH},
  {key:'paypal', label:'PayPal',  icon:'🅿️', color:'#003087', commRate:COMM_CASH},
];
const PREV_YEAR={gross:0,cogs:0,booth:0,otherExp:0,net:0,shows:0,bestShow:'',bestProfit:0};
// ===================================================
// 2025 SEASON DATA (real numbers from Excel workbook)
// Totals: Gross $26,850 | COGS $7,874 | Booth $3,400 | Other $6,057 | Net $9,088
// ===================================================
const SHOWS_2025=[];
const DEFAULT_SUPPLIES=[
  {id:'sup_bags_lg',   name:'Bags (Large)',      qty:0,low:5, unit:'pk'},
  {id:'sup_bags_sm',   name:'Bags (Small)',       qty:0,low:5, unit:'pk'},
  {id:'sup_ptowels',   name:'Paper Towels',       qty:0,low:2, unit:'roll'},
  {id:'sup_microfiber',name:'Microfiber Cloths',  qty:0,low:4, unit:'ea'},
  {id:'sup_tablecloth',name:'Table Cover',         qty:0,low:1, unit:'ea'},
  {id:'sup_trash',     name:'Trash Bags',          qty:0,low:5, unit:'ea'},
  {id:'sup_tape',      name:'Packing Tape',        qty:0,low:1, unit:'roll'},
  {id:'sup_zipties',   name:'Zip Ties',            qty:0,low:10,unit:'ea'},
  {id:'sup_markers',   name:'Markers',             qty:0,low:2, unit:'ea'},
  {id:'sup_ptags',     name:'Price Tags',          qty:0,low:20,unit:'ea'},
  {id:'sup_cards',     name:'Business Cards',      qty:0,low:50,unit:'ea'},
  {id:'sup_flyers',    name:'Flyers',              qty:0,low:20,unit:'ea'},
  {id:'sup_hsani',     name:'Hand Sanitizer',      qty:0,low:1, unit:'bottle'},
  {id:'sup_candy',     name:'Candy/Mints',         qty:0,low:1, unit:'bag'},
  {id:'sup_change',    name:'Change Bag (Cash)',   qty:0,low:1, unit:'ea'}
];
const INIT={
  v:7,
  inventory:{'32oz':0,'16oz':0,'8oz':0,'2oz':0,'c5s':0,'c5l':0},
  // Borrowed from Batman — standalone running tally, returned bottle-for-bottle.
  // NEVER mixed into `inventory`, shows, COGS, or any P&L math. Read/written only by bm* helpers.
  batmanBorrow:{},
  shows:[],
  supplies:JSON.parse(JSON.stringify(DEFAULT_SUPPLIES)),

function calcDayComm(day){ return (day.repSales||[]).reduce((t,rs)=>t+calcRepSalesComm(rs),0); }
// Calculated commission a rep earned across a show's days (before any payout override)
function repShowCalcComm(sh,repId){ let t=0; (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=calcRepSalesComm(rs); })); return t; }
// Effective per-show payout for a rep: a manual per-show payout override WINS, else the calculated commission.
function repShowComm(sh,repId){ const ov=sh.repPayout&&sh.repPayout[repId]; if(ov!=null&&ov!=='')return parseFloat(ov)||0; return repShowCalcComm(sh,repId); }
function showRepIds(sh){ const ids=new Set(); (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId)ids.add(rs.repId); })); if(sh.repPayout)Object.keys(sh.repPayout).forEach(k=>ids.add(k)); return [...ids]; }
function calcShowComm(sh){ return showRepIds(sh).reduce((t,repId)=>t+repShowComm(sh,repId),0); }
// ---- Flat / hourly / manual workers (e.g. Olivia paid straight cash). Not commission-based reps. ----
// Each worker: {id,name,role,type:'flat'|'hourly'|'manual',hours,rate,amount,paid,payMethod,payNote}
const WORKER_TYPES=[{k:'flat',l:'Flat cash payout'},{k:'hourly',l:'Hourly payout'},{k:'manual',l:'Manual custom payout'}];
function workerPayout(w){ if(!w)return 0; if(w.type==='hourly')return (parseFloat(w.hours)||0)*(parseFloat(w.rate)||0); return parseFloat(w.amount)||0; }
function showWorkerPayouts(sh){ return (sh.workers||[]).reduce((t,w)=>t+workerPayout(w),0); }
function showWorkerPaid(sh){ return (sh.workers||[]).reduce((t,w)=>t+(parseFloat(w.paid)||0),0); }
function showWorkerOwed(sh){ return (sh.workers||[]).reduce((t,w)=>t+Math.max(0,workerPayout(w)-(parseFloat(w.paid)||0)),0); }
// Total of EVERY person's payout on a show: commission reps (incl. overrides) + flat/hourly/manual workers
function showLaborTotal(sh){ return calcShowComm(sh)+showWorkerPayouts(sh); }
// Total $ a rep rang up across a show (all payment methods)
function repShowSales(sh,repId){ let t=0; (sh.days||[]).forEach(d=>(d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=PMTS.reduce((a,p)=>a+(parseFloat(rs[p.key])||0),0); })); return t; }
// A rep's CALCULATED commission on one day (before any override)
function repDayCalcComm(d,repId){ let t=0; (d.repSales||[]).forEach(rs=>{ if(rs.repId===repId)t+=calcRepSalesComm(rs); }); return t; }
// Effective commission for a DAY: each rep's per-show payout split across days by that day's share of the rep's sales/comm.
// No override ⇒ equals the day's calculated comm. With override ⇒ days sum to the payout (matches calcShowComm).
function dayCommEffective(sh,di){
  const d=(sh.days||[])[di]; if(!d)return 0; let total=0;
  showRepIds(sh).forEach(repId=>{
    const eff=repShowComm(sh,repId); if(!eff)return;
    const calcTot=repShowCalcComm(sh,repId);
    if(calcTot>0){ total+=eff*(repDayCalcComm(d,repId)/calcTot); return; }
    const days=(sh.days||[]);
    const selling=days.filter(x=>(x.repSales||[]).some(rs=>rs.repId===repId&&PMTS.some(p=>(parseFloat(rs[p.key])||0)>0)));
    const pool=selling.length?selling:days;
    if(pool.indexOf(d)>=0)total+=eff/pool.length;
  });
  return total;
}
function repEarned(repId,shId){ let total=0; (S.shows||[]).forEach(sh=>{ if(shId&&sh.id!==shId)return; total+=repShowComm(sh,repId); }); return total; }
function repPaid(repId,shId){
  const rep=(S.reps||[]).find(r=>r.id===repId);if(!rep)return 0;
  return (rep.payments||[]).filter(p=>!shId||p.showId===shId).reduce((t,p)=>t+(parseFloat(p.amount)||0),0);
}
function repOwed(repId,shId){return Math.max(0,repEarned(repId,shId)-repPaid(repId,shId));}
function allRepsOwed(){
  return (S.reps||[]).filter(r=>!r.isSelf&&r.active).map(r=>({rep:r,earned:repEarned(r.id),paid:repPaid(r.id),owed:repOwed(r.id)})).filter(x=>x.earned>0||x.owed>0);
}
function getShowDates(sh){
  // Returns array of YYYY-MM-DD dates this show occupies. Needs startDate.
  if(!sh.startDate)return[];
  const out=[];const s=new Date(sh.startDate+'T12:00:00');
  for(let i=0;i<(sh.numDays||1);i++){
    const d=new Date(s);d.setDate(d.getDate()+i);
    out.push(d.toISOString().split('T')[0]);
  }
  return out;
}

function showSortKey(sh){
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  if(sh.startDate&&/^\d{4}-\d{2}-\d{2}$/.test(sh.startDate))return sh.startDate;
  if(sh.dates&&sh.dates[0]){const m=sh.dates[0].match(/(\w{3})\s+(\d+)/);if(m&&mo[m[1]])return '2026-'+mo[m[1]]+'-'+String(m[2]).padStart(2,'0');}
  return sh.createdAt||'9999';
}

function calcBreakEven(sh){
  const mpg=S.settings.mpg||17.5;

  const flatOverhead=(typeof showFlatOverhead==='function')?showFlatOverhead(sh):0; // candy + paper towels
  const workerPay=(typeof showWorkerPayouts==='function')?showWorkerPayouts(sh):0; // flat/hourly/manual workers are fixed labor
  const fixedCosts=(sh.boothCost||0)+gas+(sh.lodging||0)+showExp+flatOverhead+workerPay;

  // Use algebraic solution: BE = fixedCosts / (1 - cogsRate - blendedCommRate)
  // cogsRate ≈ 30% (2025 average), blendedCommRate = 60% cash × 40% + 40% card × 30% = 36%
  const paidRepList=(sh.repIds||[]).map(id=>(S.reps||[]).find(x=>x.id===id)).filter(r=>r&&!r.isSelf&&r.active);
  if(paidRepList.length){
    const cogsRate=0.30;
    // Each assigned rep's blended rate (≈60% cash / 40% card sales mix), averaged across the reps working it.
    const blendedCommRate=paidRepList.reduce((t,r)=>{const rt=repCommRates(r);return t+(0.60*rt.cash+0.40*rt.card);},0)/paidRepList.length;
    const variableRate=cogsRate+blendedCommRate;
    return variableRate>=1?fixedCosts*3:fixedCosts/(1-variableRate);
  }
  return fixedCosts/(1-0.30); // no reps: just account for COGS
}

    ${(()=>{const conf=showConflicts(sh);return conf.length?`<div onclick="event.stopPropagation()" style="margin-top:6px;padding:6px 8px;background:rgba(255,140,0,0.12);border:1px solid rgba(255,140,0,0.45);border-radius:6px;font-size:11px;color:#ffc266;font-weight:700">🚨 Schedule Conflict: multiple shows on this date (${conf.map(c=>c.name).join(', ')}). Assign reps or choose which show to attend.</div>`:'';})()}
    ${missed?`<div style="margin-top:8px;padding:8px;background:var(--redbg);border:1px solid var(--redbd);border-radius:6px" onclick="event.stopPropagation()">
      <div style="font-size:9px;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:3px">❌ Why missed?</div>
      <textarea class="fi" style="font-size:12px;min-height:38px" placeholder="e.g. double-booked with Cranberry; weather; booth fell through" onchange="saveMissedReason('${sh.id}',this.value)">${(sh.missedReason||'').replace(/</g,'&lt;')}</textarea>
    </div>`:''}
    ${(sh.status==='planned'&&!missed)?`
    <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:rgba(255,200,0,0.08);border-radius:6px;border:1px solid rgba(255,200,0,0.2)">
      <div style="font-size:11px;color:var(--muted)">${sh.numDays||1} day${sh.numDays>1?'s':''} · ${sh.miles||0} mi · Booth ${sh.boothCost?fmt(sh.boothCost):'TBD'}</div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Break Even</div><div style="font-size:16px;font-weight:900;color:var(--gold)">${fmt(be)}</div></div>
    </div>
    ${(()=>{
      const dlabels=(sh.dates&&sh.dates.length)?sh.dates:Array.from({length:sh.numDays||1},(_,i)=>'Day '+(i+1));
      const sched=dlabels.map((dl,i)=>{const ct=dayCallClose(sh,i);return `<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0"><span style="color:var(--muted)">${dl}</span><span style="font-weight:700">${ct.open} – ${ct.close} <span style="color:var(--muted);font-weight:400">· call ${ct.call}</span></span></div>`;}).join('');
      const repNames=(sh.repIds||[]).map(id=>{const r=(S.reps||[]).find(x=>x.id===id);return r?r.name+(r.isSelf?' 👑':''):null;}).filter(Boolean);
      return `<div style="margin-top:6px;padding:8px;background:rgba(120,130,160,0.08);border-radius:6px">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:3px">⏰ Actual Show Hours · call/setup = 1 hr before open</div>
        ${sched}
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;margin:6px 0 3px">👥 Reps scheduled</div>
        <div style="font-size:12px;font-weight:700">${repNames.length?repNames.join(', '):'<span style="color:var(--muted);font-weight:400">None yet — tap the show to assign</span>'}</div>
      </div>`;
    })()}`:``}
    ${(sh.status==='active'||sh.status==='completed')?`
    <div class="sc-stats" style="gap:4px">
      <div class="sc-s"><div class="sv2" style="color:var(--green)">${fmt(t.gross)}</div><div class="sl2">Gross</div></div>
      <div class="sc-s"><div class="sv2" style="color:var(--red)">${fmt(t.cogs)}</div><div class="sl2">COGS</div></div>
      <div class="sc-s"><div class="sv2" style="color:var(--red)">${fmt(t.expenses)}</div><div class="sl2">Exp</div></div>
      <div class="sc-s"><div class="sv2" style="color:var(--red)">${fmt(t.taxRes)}</div><div class="sl2">Tax</div></div>
      <div class="sc-s"><div class="sv2" style="color:${t.profit>=0?'var(--green)':'var(--red)'}">${fmt(t.profit)}</div><div class="sl2">Profit</div></div>
    </div>`:``}
    <div style="margin-top:8px" onclick="event.stopPropagation()">
      <button style="width:100%;font-size:11px;padding:6px 8px;background:rgba(255,215,0,0.14);border:1px solid var(--goldbd);color:var(--gold);border-radius:6px;cursor:pointer;font-weight:800" onclick="showEditCosts('${sh.id}')">✏️ Edit Show — name · days · costs · tax</button>
    </div>
    <div style="margin-top:6px;display:flex;gap:6px" onclick="event.stopPropagation()">
      <button style="flex:1;font-size:11px;padding:5px 8px;background:rgba(100,149,237,0.12);border:1px solid rgba(100,149,237,0.3);color:#7EB8F7;border-radius:6px;cursor:pointer;font-weight:700" onclick="showLodgingModal('${sh.id}')">${sh.lodging?'🏨 '+fmt(sh.lodging):'🏨 Lodging'}</button>
      <button style="flex:1;font-size:11px;padding:5px 8px;background:${(sh.showExpenses||[]).length?'rgba(255,165,0,0.15)':'rgba(255,165,0,0.07)'};border:1px solid rgba(255,165,0,0.3);color:#FFA500;border-radius:6px;cursor:pointer;font-weight:700" onclick="showShowExpModal('${sh.id}')">${(sh.showExpenses||[]).length?'💸 Exp: '+fmt((sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0)):'💸 Other Expenses'}</button>
    </div>
  </div>`;
}
function showLodgingModal(id){
  const sh=S.shows.find(s=>s.id===id);if(!sh)return;

  <div style="padding:8px 0 14px;font-size:13px;color:var(--muted)">${sh.name}</div>
  ${sh.lodgingNote?`<div class="wb gold" style="margin-bottom:12px">📍 ${sh.lodgingNote}</div>`:''}
  <div class="fg"><label class="fl">Total Lodging Cost ($)</label><input class="fi" type="number" id="lod_amt" placeholder="0.00" step="0.01" min="0" value="${sh.lodging||''}"></div>
  <div class="fg"><label class="fl">Lodging Notes</label><input class="fi" type="text" id="lod_note" placeholder="e.g. Airbnb in Merrillan WI — 34 min drive" value="${sh.lodgingNote||''}"></div>
  <div style="font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:12px">Lodging is added to your Break Even calculation automatically.</div>
  <button class="btn btn-gold btn-full" onclick="saveLodging('${id}')">Save Lodging</button>`);
}
function saveLodging(id){
  const sh=S.shows.find(s=>s.id===id);if(!sh)return;
  sh.lodging=parseFloat($$('lod_amt').value)||0;
  const note=($$('lod_note').value||'').trim();
  if(note)sh.lodgingNote=note;
  saveS();mClose();toast('Lodging saved!');rShows();
}
function saveMissedReason(id,val){
  const sh=S.shows.find(s=>s.id===id);if(!sh)return;
  sh.missedReason=(val||'').trim();
  saveS();
}

function showShowExpModal(id){
  const sh=S.shows.find(s=>s.id===id);if(!sh)return;
  if(!sh.showExpenses)sh.showExpenses=[];
  const total=sh.showExpenses.reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
  const listHtml=sh.showExpenses.length?sh.showExpenses.map((e,i)=>{
    const cat=SHOW_EXP_CATS.find(c=>c.key===e.cat)||{icon:'💸',label:'Other'};
    return`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:18px">${cat.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">${cat.label}${e.desc?' — '+e.desc:''}</div>
        <div style="font-size:11px;color:var(--muted)">${e.date||''}</div>
      </div>
      <div style="font-size:15px;font-weight:900;color:var(--red);margin-right:6px">-${fmt(e.amount)}</div>
      <button style="background:var(--redbg);border:1px solid var(--redbd);color:var(--red);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700" onclick="delShowExp('${id}',${i})">✕</button>
    </div>`;
  }).join(''):`<div style="font-size:12px;color:var(--muted);padding:10px 0">No expenses logged yet.</div>`;
  const today=new Date().toISOString().split('T')[0];
  mOpen(`<div class="mh"><div class="mt">💸 Other Expenses</div><button class="mx" onclick="mClose()">×</button></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${sh.name}</div>
  ${total>0?`<div style="font-size:14px;font-weight:900;color:var(--red);margin-bottom:12px">Total: -${fmt(total)}</div>`:''}
  ${listHtml}
  <div style="margin-top:14px;padding-top:12px;border-top:2px solid var(--border)">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:10px">ADD EXPENSE</div>
    <div class="fg"><label class="fl">Category</label>
      <select class="fi" id="se_cat">
        ${SHOW_EXP_CATS.map(c=>`<option value="${c.key}">${c.icon} ${c.label}</option>`).join('')}
      </select>
    </div>
    <div class="g2" style="gap:10px">
      <div class="fg"><label class="fl">Amount ($)</label><input class="fi" type="number" id="se_amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="se_date" value="${today}"></div>
    </div>
    <div class="fg"><label class="fl">Description (optional)</label><input class="fi" type="text" id="se_desc" placeholder="e.g. Round trip gas, Airbnb, supplies run"></div>
    <button class="btn btn-gold btn-full" onclick="addShowExp('${id}')">Add Expense</button>
  </div>`);
}
function addShowExp(id){
  const sh=S.shows.find(s=>s.id===id);if(!sh)return;
  const amt=parseFloat($$('se_amt').value);
  if(!amt||amt<=0){toast('Enter a valid amount');return;}
  if(!sh.showExpenses)sh.showExpenses=[];
  sh.showExpenses.push({
    id:'se_'+Date.now(),
    cat:$$('se_cat').value,
    amount:amt,
    desc:($$('se_desc').value||'').trim(),
    date:$$('se_date').value||new Date().toISOString().split('T')[0]
  });
  saveS();toast('Expense added!');showShowExpModal(id);
}
function delShowExp(id,idx){
  const sh=S.shows.find(s=>s.id===id);if(!sh||!sh.showExpenses)return;
  if(!confirm('Delete this expense?'))return;
  sh.showExpenses.splice(idx,1);
  saveS();toast('Expense removed');showShowExpModal(id);
}

// P&L TAB
// ===================================================
function rPnL(){
  const y=new Date().getFullYear();
  const ytd=calcYTD();
  const tax=S.settings.tax||0.28;
  const taxAmt=ytd.taxRes; // card/Square sales × per-show tax rate (cash excluded)
  const keep=Math.max(0,ytd.profit-taxAmt);
  const qtr=taxAmt/4;

  // Expense breakdown
  let boothTotal=0,showExpTotal=0,dayExpTotal=0,lodgingTotal=0;
  S.shows.forEach(sh=>{
    if(sh.status==='completed'){
      boothTotal+=sh.boothCost||0;
      showExpTotal+=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
      lodgingTotal+=sh.lodging||0;
      (sh.days||[]).forEach(d=>{if(d.expenses)dayExpTotal+=Object.values(d.expenses).reduce((a,b)=>a+(parseFloat(b)||0),0);});
    } else {
      boothTotal+=boothPaid(sh);
      showExpTotal+=(sh.showExpenses||[]).reduce((t,e)=>t+(parseFloat(e.amount)||0),0);
      lodgingTotal+=sh.lodging||0;
    }
  });
  const globalSupply=ytd.otherSpend||0;

  // Show-by-show P&L for completed shows
  const done=S.shows.filter(s=>s.status==='completed').sort((a,b)=>showSortKey(a)<showSortKey(b)?-1:1);

  // Category expense breakdown across all shows
  const catTotals={};
  S.shows.forEach(sh=>{
    (sh.showExpenses||[]).forEach(e=>{
      catTotals[e.cat]=(catTotals[e.cat]||0)+(parseFloat(e.amount)||0);
    });
  });

  const margin=ytd.gross>0?Math.round((ytd.profit/ytd.gross)*100):0;
  const expenseTotal=ytd.expenses;

  let h=`<div class="sec-title" style="margin-bottom:12px">💰 P&amp;L — ${y}</div>`;

  // Top summary
  h+=`<div class="card gb" style="margin-bottom:12px">
    <div class="g2" style="gap:8px;margin-bottom:10px">
      <div class="sbox gb"><div class="sl">Gross Revenue</div><div class="sv">${fmt(ytd.gross)}</div></div>
      <div class="sbox ${ytd.profit>=0?'grb':'rb'}"><div class="sl">Net Profit</div><div class="sv ${ytd.profit>=0?'g':'r'}">${fmt(ytd.profit)}</div></div>
      <div class="sbox rb"><div class="sl">Total Expenses</div><div class="sv r sm">${fmt(expenseTotal)}</div></div>
      <div class="sbox"><div class="sl">Profit Margin</div><div class="sv w sm">${margin}%</div></div>
    </div>
    <div class="sr"><span class="srl">Product COGS</span><span class="srv red">-${fmt(ytd.cogs)}</span></div>
    <div class="sr"><span class="srl">Booth / Vendor Fees</span><span class="srv red">-${fmt(boothTotal)}</span></div>
    <div class="sr"><span class="srl">Show Expenses (fuel, hotel, etc.)</span><span class="srv red">-${fmt(showExpTotal+lodgingTotal+dayExpTotal)}</span></div>
    <div class="sr" style="border-bottom:none"><span class="srl">Supply Purchases</span><span class="srv red">-${fmt(globalSupply)}</span></div>
    ${ytd.totalCommissions>0?`<div class="sr" style="border-top:1px solid var(--redbd);margin-top:4px;border-bottom:none"><span class="srl">Rep Commissions (earned)</span><span class="srv red">-${fmt(ytd.totalCommissions)}</span></div>`:''}
  </div>
  ${(()=>{
    const owedReps=allRepsOwed();if(!owedReps.length)return'';
    const totalOwed=owedReps.reduce((t,x)=>t+x.owed,0);
    return`<div class="sec-lbl">REP COMMISSIONS</div>
    <div class="card ${totalOwed>0?'rb':'grb'}" style="margin-bottom:12px">
      <div class="g2" style="gap:8px;margin-bottom:10px">
        <div class="sbox rb"><div class="sl">Total Earned YTD</div><div class="sv r sm">${fmt(owedReps.reduce((t,x)=>t+x.earned,0))}</div></div>
        <div class="sbox ${totalOwed>0?'rb':'grb'}"><div class="sl">Still Owed</div><div class="sv ${totalOwed>0?'r':'g'} sm">${fmt(totalOwed)}</div></div>
      </div>
      ${owedReps.map(x=>`<div class="sr"><span class="srl">${x.rep.name}</span><div style="text-align:right"><div style="font-size:12px;color:var(--red)">Earned ${fmt(x.earned)}</div>${x.owed>0?`<div style="font-size:11px;color:var(--gold);font-weight:800">Owed ${fmt(x.owed)}</div>`:`<div style="font-size:11px;color:var(--green)">✓ Paid</div>`}</div></div>`).join('')}
      <button class="btn btn-ghost btn-sm btn-full" style="margin-top:10px" onclick="go('settings')">Manage Rep Payments → Setup Tab</button>
    </div>`;
  })()} <div style="display:none" id="pnl-after-comm"></div>`;

  // Tax reserve card
  h+=`<div class="card rb" style="margin-bottom:12px">
    <div style="font-size:10px;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:10px">🧾 TAX RESERVE (${Math.round(tax*100)}% of card/Square sales)</div>
    <div class="g2" style="gap:8px;margin-bottom:10px">
      <div class="sbox rb"><div class="sl">Set Aside Now</div><div class="sv r">${fmt(taxAmt)}</div></div>
      <div class="sbox grb"><div class="sl">Keep (${100-Math.round(tax*100)}%)</div><div class="sv g">${fmt(keep)}</div></div>
    </div>
    <div class="sr"><span class="srl">Estimated Quarterly Payment</span><span class="srv red">${fmt(qtr)}</span></div>
    <div class="sr"><span class="srl">Q1 Due (Apr 15)</span><span class="srv">${fmt(qtr)}</span></div>
    <div class="sr"><span class="srl">Q2 Due (Jun 15)</span><span class="srv">${fmt(qtr)}</span></div>
    <div class="sr"><span class="srl">Q3 Due (Sep 15)</span><span class="srv">${fmt(qtr)}</span></div>
    <div class="sr" style="border-bottom:none"><span class="srl">Q4 Due (Jan 15 next yr)</span><span class="srv">${fmt(qtr)}</span></div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px">Quarterly amounts are estimates based on even splits of total reserve. Adjust based on when income was earned. Change tax % in Setup.</div>
  </div>`;

  // Show expense category breakdown (if any)
  const catKeys=Object.keys(catTotals);
  if(catKeys.length>0){
    h+=`<div class="sec-lbl">SHOW EXPENSE BREAKDOWN</div>
    <div class="card" style="margin-bottom:12px">`;
    catKeys.sort((a,b)=>catTotals[b]-catTotals[a]).forEach(k=>{
      const cat=SHOW_EXP_CATS.find(c=>c.key===k)||{icon:'💸',label:'Other'};
      h+=`<div class="sr"><span class="srl">${cat.icon} ${cat.label}</span><span class="srv red">-${fmt(catTotals[k])}</span></div>`;
    });
    h+=`<div class="sr" style="border-bottom:none"><span class="srl b">Total Show Expenses</span><span class="srv red lg">-${fmt(Object.values(catTotals).reduce((a,b)=>a+b,0))}</span></div>`;
    h+=`</div>`;
  }

  // Completed shows P&L table
  if(done.length>0){
    h+=`<div class="sec-lbl">COMPLETED SHOWS — P&amp;L</div>`;
    done.forEach(sh=>{
      const t=calcShow(sh);
      const netColor=t.profit>=0?'var(--green)':'var(--red)';
      const netSign=t.profit>=0?'+':'';
      h+=`<div class="card" style="cursor:pointer;padding:10px 14px;margin-bottom:7px" onclick="go('show','${sh.id}',0)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:14px">${sh.name}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${sh.dates?sh.dates[0]:''}${sh.dates&&sh.dates.length>1?' – '+sh.dates[sh.dates.length-1]:''} · ${sh.numDays} day${sh.numDays>1?'s':''}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
              <span class="chip" style="font-size:9px">${fmt(t.gross)} gross</span>
              <span class="chip" style="font-size:9px;background:var(--redbg);color:var(--red);border-color:var(--redbd)">${fmt(t.expenses)} exp</span>
            </div>
          </div>
          <div style="text-align:right;margin-left:12px;flex-shrink:0">
            <div style="font-size:18px;font-weight:900;color:${netColor}">${netSign}${fmt(t.profit)}</div>
            <div style="font-size:9px;color:var(--muted)">${t.gross>0?Math.round((t.profit/t.gross)*100):0}% margin</div>
          </div>
        </div>
      </div>`;
    });
  } else {
    h+=`<div class="empty"><div class="ei">📊</div><div>Complete some shows to see P&amp;L here.</div></div>`;
  }

  // Show efficiency — profit per hour & per mile (work hours now accurate from the hours audit)
  if(done.length>0){
    const rows=done.map(sh=>{const t=calcShow(sh);const hrs=(typeof showWorkHoursTotal==='function')?showWorkHoursTotal(sh):0;const mi=(typeof showMiles==='function')?showMiles(sh):0;return {name:sh.name,profit:t.profit,perHr:hrs>0?t.profit/hrs:null,perMi:mi>0?t.profit/mi:null,hrs,mi};});
    const byHr=[...rows].sort((a,b)=>((b.perHr==null?-1e12:b.perHr)-(a.perHr==null?-1e12:a.perHr)));
    h+=`<div class="sec-lbl">SHOW EFFICIENCY — PROFIT / HOUR &amp; / MILE</div>
    <div class="card" style="margin-bottom:12px">

  mOpen(`<div class="mh"><div class="mt">🔄 Transfer Stock Between Shows</div><button class="mx" onclick="mClose()">×</button></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Moves packed units from one show to another (e.g. one booth ran out). This is NOT a sale — revenue, units sold, and rep totals are untouched.</div>
  <div class="fg"><label class="fl">Product</label><select class="fi" id="tr_sku">${SKUS.map(s=>`<option value="${s.key}">${s.name}</option>`).join('')}</select></div>

  <button class="btn btn-gold btn-full" onclick="saveTransfer()">✅ Transfer</button>`);
}
function saveTransfer(){
  const sku=$$('tr_sku').value, qty=parseInt($$('tr_qty').value)||0;
  const fromId=$$('tr_from').value, toId=$$('tr_to').value;
  if(qty<=0){toast('Enter a quantity');return;}
  if(fromId===toId){toast('Pick two different shows');return;}
  const from=S.shows.find(s=>s.id===fromId), to=S.shows.find(s=>s.id===toId);
  if(!from||!to){toast('Show not found');return;}
  from.packedInventory=from.packedInventory||{}; to.packedInventory=to.packedInventory||{};
  const avail=from.packedInventory[sku]||0;
  if(qty>avail&&!confirm(`${from.name} only shows ${avail} packed. Transfer anyway?`))return;
  from.packedInventory[sku]=(from.packedInventory[sku]||0)-qty;
  to.packedInventory[sku]=(to.packedInventory[sku]||0)+qty;
  if(!S.transfers)S.transfers=[];
  S.transfers.push({id:'tr_'+Date.now(),ts:new Date().toISOString(),date:new Date().toISOString().split('T')[0],sku,qty,fromShowId:fromId,fromName:from.name,toShowId:toId,toName:to.name});
  mClose();saveS();
  const sName=(SKUS.find(s=>s.key===sku)||{}).short||sku;
  toast(`🔄 Moved ${qty} ${sName}: ${from.name} → ${to.name}`);
}
function delTransfer(id){
  if(!S.transfers)return;
  const tr=S.transfers.find(x=>x.id===id);if(!tr)return;
  if(!confirm('Undo this transfer? Units move back from '+tr.toName+' to '+tr.fromName+'.'))return;
  const from=S.shows.find(s=>s.id===tr.fromShowId), to=S.shows.find(s=>s.id===tr.toShowId);
  if(from){from.packedInventory=from.packedInventory||{};from.packedInventory[tr.sku]=(from.packedInventory[tr.sku]||0)+tr.qty;}
  if(to){to.packedInventory=to.packedInventory||{};to.packedInventory[tr.sku]=(to.packedInventory[tr.sku]||0)-tr.qty;}
  S.transfers=S.transfers.filter(x=>x.id!==id);
  saveS();toast('Transfer undone');
}

// ===================================================
// PRE-SHOW INVENTORY CALCULATOR
// "What am I bringing?" → potential sales volume + potential commission, before any inventory is logged.
// ===================================================
function preShowStockOf(sh){
  // Use the explicit pre-show plan if set; otherwise fall back to what's packed to the show.
  if(sh.preShowStock&&Object.values(sh.preShowStock).some(v=>(parseInt(v)||0)>0))return sh.preShowStock;
  if(sh.packedInventory&&Object.values(sh.packedInventory).some(v=>(parseInt(v)||0)>0))return sh.packedInventory;
  return sh.preShowStock||{};
}
function preShowTotals(sh){
  const st=preShowStockOf(sh);
  let units=0,volume=0,cogs=0;
  SKUS.forEach(s=>{const q=parseInt(st[s.key])||0;units+=q;volume+=q*getP(s.key);cogs+=q*s.cost;});
  const commission=volume*DEFAULT_COMM_RATE; // potential commission if every unit sold, at the generic rate
  return {st,units,volume,cogs,commission};
}
function preShowCalcHTML(sh){
  const {st,units,volume,cogs,commission}=preShowTotals(sh);
  const usingPacked=!(sh.preShowStock&&Object.values(sh.preShowStock).some(v=>(parseInt(v)||0)>0)) && units>0;
  const rows=SKUS.map(s=>{const q=parseInt(st[s.key])||0;if(!q)return'';return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)"><span>${s.emoji} ${s.short} × <strong>${q}</strong></span><span style="color:var(--gold)">${fmt(q*getP(s.key))}</span></div>`;}).join('');
  return `<div class="card gb" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:800">🎒 Pre-Show Inventory Calculator</div>
      <button class="btn btn-gold btn-xs" onclick="openPreShowStock('${sh.id}')">${units>0?'✏️ Edit Stock':'+ Enter Stock'}</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Enter the stock you're bringing to this show to see what it could do — before you log a single count.${usingPacked?' <span style="color:var(--blue)">(showing packed inventory)</span>':''}</div>
    ${units>0?`
    <div class="g3" style="margin-bottom:10px">
      <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--gold)">${fmtN(units)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Units Bringing</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--green)">${fmt(volume)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Potential Sales</div></div>
      <div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--blue)">${fmt(commission)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Potential Comm.</div></div>
    </div>
    ${rows}
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">
      <span>Cost of goods on this stock: <strong style="color:var(--text)">${fmt(cogs)}</strong></span>
      <span>Comm. @ ${Math.round(DEFAULT_COMM_RATE*100)}% of full sell-through</span>
    </div>`:`<div style="text-align:center;color:var(--muted);font-size:12px;padding:8px 0">No stock entered yet. Tap <strong style="color:var(--gold)">+ Enter Stock</strong> to project this show's potential.</div>`}
  </div>`;
}
function openPreShowStock(shId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  const st=sh.preShowStock||{};
  mOpen(`<div class="mh"><div class="mt">🎒 Stock You're Bringing</div><button class="mx" onclick="mClose()">×</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Enter how many of each you're packing for <strong>${sh.name}</strong>. We'll project potential sales volume and commission.</div>
    ${SKUS.map(s=>`<div class="cr"><div class="cr-i"><div class="cr-n">${s.emoji} ${s.name}</div><div class="cr-s">${fmt(getP(s.key))} each</div></div><div class="cr-c"><input class="cri" type="number" inputmode="numeric" id="pss_${s.key}" value="${parseInt(st[s.key])||''}" placeholder="0" min="0"></div></div>`).join('')}
    <div id="pssLive" style="font-size:12px;color:var(--muted);text-align:center;margin:12px 0"></div>

    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="clearPreShowStock('${shId}')">Clear</button>`);
  const live=()=>{let u=0,v=0;SKUS.forEach(s=>{const q=parseInt(($$('pss_'+s.key)||{}).value)||0;u+=q;v+=q*getP(s.key);});const el=$$('pssLive');if(el)el.innerHTML=`Bringing <strong style="color:var(--gold)">${u}</strong> units · potential <strong style="color:var(--green)">${fmt(v)}</strong> · comm. <strong style="color:var(--blue)">${fmt(v*DEFAULT_COMM_RATE)}</strong>`;};
  SKUS.forEach(s=>{const el=$$('pss_'+s.key);if(el)el.addEventListener('input',live);});
  live();
}
function savePreShowStock(shId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  const st={};SKUS.forEach(s=>{const v=parseInt(($$('pss_'+s.key)||{}).value)||0;if(v>0)st[s.key]=v;});
  sh.preShowStock=st;mClose();saveS();toast('Pre-show stock saved');
}
function clearPreShowStock(shId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  sh.preShowStock={};mClose();saveS();toast('Pre-show stock cleared');
}

function rDay(sh,di){
  const d=sh.days[di];if(!d)return'';

  const pmtT=calcPmt(d.payments||{});
  const dayExp=Object.values(d.expenses||{}).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const bpd=(sh.boothCost||0)/sh.numDays;
  const dayComm=dayCommEffective(sh,di); // reflects MANUAL payout overrides (split across days), not just the cash/card calc
  const dayLoss=Math.max(0,rev-pmtT); // potential not collected (discounts/freebies/shortfall)

        <button class="btn btn-xs ${haM?'btn-ghost':'btn-gold'} btn-full" style="margin-top:8px" onclick="showCntModal('${sh.id}',${di},'morning')">${haM?'Edit':'Count'}</button>
      </div>
      <div style="flex:1;background:var(--card2);border-radius:8px;padding:8px;border:1px solid ${haE?'var(--border)':(haM?'var(--gold)':'var(--border)')}">
        <div style="text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;color:#B98AE6;margin-bottom:6px">🌙 Evening</div>
        ${SKUS.map(s=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:var(--muted)">${s.short}</span><span style="font-weight:800">${haE?(d.eveningCount[s.key]||0):'—'}</span></div>`).join('')}
        <button class="btn btn-xs ${haE?'btn-ghost':(haM?'btn-gold':'btn-outline')} btn-full" style="margin-top:8px" onclick="showCntModal('${sh.id}',${di},'evening')" ${!haM?'disabled':''}>${haE?'Edit':'Count'}</button>
      </div>
      <div style="flex:1;background:var(--card2);border-radius:8px;padding:8px;border:1px solid ${haP?'var(--border)':(haE?'var(--gold)':'var(--border)')}">
        <div style="text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;color:#00D26A;margin-bottom:6px">💰 Money</div>
        ${PMTS.map(p=>`<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:var(--muted)">${p.label}</span><span style="font-weight:700">${haP?((d.payments[p.key]||0)>0?fmt(d.payments[p.key]):'—'):''}</span></div>`).join('')}

    <div style="display:flex;flex-wrap:wrap;gap:5px">
      <span class="chip">Gas: <strong>${fmt(d.expenses?.gas||0)}</strong></span>
      <span class="chip">Food: <strong>${fmt(d.expenses?.food||0)}</strong></span>
      <span class="chip">Hotel: <strong>${fmt(d.expenses?.hotel||0)}</strong></span>
      <span class="chip">Other: <strong>${fmt(d.expenses?.other||0)}</strong></span>

    ${haM&&haE?`<div class="div"></div>
    <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">DAY SUMMARY · REAL CASH</div>
    <div class="sr"><span class="srl">Money Collected</span><span class="srv gold">${fmt(pmtT)}</span></div>
    ${rev>0?`<div class="sr"><span class="srl" style="color:var(--muted)">Potential (full price)</span><span class="srv" style="color:var(--muted)">${fmt(rev)}</span></div>`:''}

    <div class="sr"><span class="srl b">Keep</span><span class="srv lg green">${fmt(Math.max(0,profit-taxRes))}</span></div>`:''}

      const showReps=(sh.repIds||[]).filter(id=>{const r=(S.reps||[]).find(x=>x.id===id);return r&&r.active;});

      const ownerRep=(S.reps||[]).find(r=>r.isSelf&&r.active);

function openCloseout(shId,di){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return; const d=sh.days[di];if(!d)return;
  const hasM=!!d.morningCount, hasE=!!d.eveningCount, hasP=calcPmt(d.payments)>0;
  const staffed=(sh.repIds||[]).some(id=>{const r=(S.reps||[]).find(x=>x.id===id);return r&&r.active;});
  const dayTotal=calcPmt(d.payments);
  const carry=invCarryIssues(sh).filter(m=>m.di===di), neg=invNegativeSold(sh).filter(m=>m.di===di);
  const reconBad=(carry.length&&!d.carryReason)||neg.length>0;
  const reconOK=!carry.length&&!neg.length;
  const cc=dayCashCheck(sh,di);
  const cashLine=cc.state==='short'?(' · cash short '+fmt(cc.amt)+' vs product sold (ok if discounts)'):cc.state==='over'?(' · cash '+fmt(cc.amt)+' OVER — recheck counts'):cc.state==='ok'?' · cash matches inventory':'';
  const payCount=(d.repSales||[]).length+(sh.workers||[]).length;
  const ic=v=>v===true?'✅':v==='opt'?'◽':'⬜';
  const step=(n,title,state,detail,btn)=>`<div style="display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)"><div style="font-size:17px;line-height:1.3">${ic(state)}</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${n}. ${title}</div><div style="font-size:11px;color:var(--muted)">${detail}</div>${btn?`<div style="margin-top:6px">${btn}</div>`:''}</div></div>`;
  const canLock=hasE&&hasP&&!reconBad;
  const moneyBtn=staffed
    ? `<button class="btn btn-xs ${hasP?'btn-ghost':'btn-gold'}" onclick="mClose();go('show','${sh.id}',${di})">${hasP?'Review rep sales':'Enter rep sales'}</button> <button class="btn btn-xs btn-ghost" onclick="showMoneyModal('${sh.id}',${di})">Override total</button>`
    : `<button class="btn btn-xs ${hasP?'btn-ghost':'btn-gold'}" onclick="showMoneyModal('${sh.id}',${di})">${hasP?'Edit money':'Count money'}</button>`;
  mOpen(`<div class="mh"><div class="mt">🏁 Day Closeout</div><button class="mx" onclick="mClose()">×</button></div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${sh.name} · ${d.date||('Day '+(di+1))}. Work top to bottom — reopen anytime to see what's left.</div>
  ${d.locked?`<div class="wb green" style="margin-bottom:10px">🔒 Finalized & locked. <button class="btn btn-xs btn-ghost" onclick="unlockDay('${sh.id}',${di});setTimeout(()=>openCloseout('${sh.id}',${di}),50)">Unlock to edit</button></div>`:''}
  ${step(1,'Evening count',hasE?true:false,hasE?'Counted — unsold product recorded.':'Count all unsold product at end of day.',`<button class="btn btn-xs ${hasE?'btn-ghost':'btn-gold'}" onclick="showCntModal('${sh.id}',${di},'evening')" ${!hasM?'disabled style="opacity:.5"':''}>${hasE?'Edit count':'Count now'}</button>${!hasM?' <span style="font-size:10px;color:var(--muted)">(do morning count first)</span>':''}`)}
  ${step(2,'Money'+(staffed?' (auto-sums from reps)':''),hasP?true:false,hasP?('Day total '+fmt(dayTotal)+(d.paymentsAuto?' · auto from reps':'')):(staffed?'Enter each rep\'s sales — day total fills in automatically.':'Enter the day\'s money count.'),moneyBtn)}
  ${step(3,'Day expenses',(d.expenses&&Object.values(d.expenses).some(v=>parseFloat(v)>0))?true:'opt','Gas, food, parking, hotel for the day (optional).',`<button class="btn btn-xs btn-ghost" onclick="showExpModal('${sh.id}',${di})">Edit expenses</button>`)}
  ${step(4,'Rep & worker payouts',payCount?true:'opt',payCount?(payCount+' logged. Set what you actually paid on the show page.'):'Set what you paid each person (optional). Open the show to log.',`<button class="btn btn-xs btn-ghost" onclick="mClose();go('show','${sh.id}',${di})">Go to payouts</button>`)}
  ${step(5,'Reconciliation — inventory + cash',reconBad?false:(reconOK?true:'opt'),(reconBad?'⚠️ Inventory mismatch — fix before locking.':(reconOK?'Counts reconcile.':'Reviewed (override on file).'))+cashLine,reconBad?`<button class="btn btn-xs btn-gold" onclick="mClose();go('show','${sh.id}',${di})">Review mismatch</button>`:'')}
  ${(cc.state==='short'||cc.state==='over')?dayCashCheckHTML(sh,di,false):''}
  <div style="margin-top:14px">
    <button class="btn ${canLock&&!d.locked?'btn-gold':'btn-ghost'} btn-full" ${(!canLock||d.locked)?'disabled style="opacity:.5"':''} onclick="lockDay('${sh.id}',${di});mClose();go('show','${sh.id}',${di})">${d.locked?'🔒 Already finalized':'🔒 Finalize & Lock Day'}</button>
    ${(!canLock&&!d.locked)?`<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:6px">${!hasE?'Need evening count. ':''}${!hasP?'Need a money total. ':''}${reconBad?'Resolve the inventory mismatch. ':''}</div>`:''}
  </div>`);
}

function pkA(k,d){const i=$$('pk_'+k);const m=S.inventory[k]||0;i.value=Math.max(0,Math.min(m,parseInt(i.value||0)+d));}
function pkAll(shId){SKUS.forEach(s=>{const i=$$('pk_'+s.key);if(i)i.value=S.inventory[s.key]||0;});}

function cA(id,d){const e=$$(id);e.value=Math.max(0,parseInt(e.value||0)+d);}
function saveCount(shId,di,type){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  const d=sh.days[di];
  if(d.locked){ toast('🔒 Day is locked. Unlock it to edit.'); return; }
  const c={};SKUS.forEach(s=>c[s.key]=parseInt($$('c_'+s.key).value)||0);
  const before=(type==='morning'?d.morningCount:d.eveningCount)||null;
  const diffs=SKUS.filter(s=>(before?(before[s.key]||0):null)!==(c[s.key]||0)).map(s=>`${s.short}:${before?(before[s.key]||0):'—'}→${c[s.key]||0}`);
  if(type==='morning')d.morningCount=c;
  else{d.eveningCount=c;if(di<sh.days.length-1&&!sh.days[di+1].morningCount)sh.days[di+1].morningCount={...c};}
  invLogPush(sh,{ts:new Date().toISOString(),di,date:d.date,type:type+' count',changes:diffs.length?diffs:['(no change)'],by:'owner'});
  // Cross-day continuity check on a morning entry — flag if it doesn't match last night's ending
  let warn='';
  if(type==='morning'&&di>0&&sh.days[di-1].eveningCount){
    const mm=SKUS.some(s=>(sh.days[di-1].eveningCount[s.key]||0)!==(c[s.key]||0));
    if(mm){ d.carryReason=null; warn=' ⚠️ Does NOT match last night — see Reconciliation.'; }
  }
  mClose();saveS();toast((type==='morning'?'Morning count saved!':'Evening count saved!')+warn);
}

function reconcileCarry(shId,di){ const sh=S.shows.find(s=>s.id===shId);if(!sh)return; const d=sh.days[di];if(!d)return; const reason=(typeof prompt==='function')?prompt('Explain the change from last night (e.g. restocked 12 C5S, recounted, damaged/lost):'):'reviewed'; if(reason===null)return; d.carryReason=reason||'(reviewed)'; invLogPush(sh,{ts:new Date().toISOString(),di,date:d.date,type:'reconcile',changes:['override accepted: '+d.carryReason],by:'owner'}); saveS();toast('✅ Reconciliation noted'); }
function fixCarryFromPrev(shId,di){ const sh=S.shows.find(s=>s.id===shId);if(!sh)return; const d=sh.days[di],prev=sh.days[di-1]; if(!prev||!prev.eveningCount)return; d.morningCount={...prev.eveningCount}; d.carryReason=null; invLogPush(sh,{ts:new Date().toISOString(),di,date:d.date,type:'autofix',changes:['opening reset to last night ending'],by:'owner'}); saveS();toast('✅ Opening reset to last night ending'); }

function openDebtPmt(){

  const paid=(debt.payments||[]).reduce((t,p)=>t+(parseFloat(p.amount)||0),0);
  const bal=Math.max(0,(debt.originalBalance||0)-paid);
  const today=new Date().toISOString().split('T')[0];

  <div class="fg"><label class="fl">NOTE (optional)</label><input class="fi" id="dpt_note" placeholder="e.g. Venmo, check #1234"></div>

  <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="mClose()">Cancel</button>`);

function saveDebtPmt(){
  const amt=parseFloat($$('dpt_amt').value);
  if(!amt||amt<=0){toast('Enter a valid amount');return;}
  const date=$$('dpt_date').value||new Date().toISOString().split('T')[0];

function exportCalICS(){
  const shows=S.shows.filter(sh=>sh.startDate);
  if(!shows.length){toast('No shows to export');return;}
  const CRLF='\r\n';
  let ics='BEGIN:VCALENDAR'+CRLF+'VERSION:2.0'+CRLF+'PRODID:-//Best Solution//Show Calendar//EN'+CRLF+'CALSCALE:GREGORIAN'+CRLF+'METHOD:PUBLISH'+CRLF;
  shows.forEach(sh=>{
    const s=new Date(sh.startDate+'T08:00:00');
    const e=new Date(sh.startDate+'T08:00:00');
    e.setDate(e.getDate()+(sh.numDays||1));
    const fmt8=d=>d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    const stamp=fmt8(new Date());
    const boothNote='Booth: '+(sh.boothCost?'$'+sh.boothCost.toFixed(2):'TBD')+' | '+( sh.numDays||1)+' day(s) | '+(sh.confirmed?'CONFIRMED':'PENDING');
    ics+='BEGIN:VEVENT'+CRLF;
    ics+='UID:'+(sh.id||('bs_'+Date.now()))+'@bestsolution'+CRLF;
    ics+='DTSTAMP:'+stamp+CRLF;
    ics+='DTSTART:'+fmt8(s)+CRLF;
    ics+='DTEND:'+fmt8(e)+CRLF;
    ics+='SUMMARY:'+(sh.confirmed?'✅ ':'⏳ ')+sh.name+CRLF;
    ics+='LOCATION:'+(sh.location||'')+CRLF;
    ics+='DESCRIPTION:'+boothNote+CRLF;
    ics+='END:VEVENT'+CRLF;
  });
  ics+='END:VCALENDAR';
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='BestSolution_Shows_2026.ics';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  toast('📅 Calendar file downloaded!');
}

// ===================================================
// CALENDAR (month grid view)
// ===================================================
function calShift(delta){
  if(!calMonth){const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};}
  let m=calMonth.m+delta,y=calMonth.y;
  if(m<0){m=11;y--;}
  if(m>11){m=0;y++;}
  calMonth={y,m};
  rCalendar();
}
function calToday(){
  const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};
  rCalendar();
}
function rCalendar(){
  if(!calMonth){const n=new Date();calMonth={y:n.getFullYear(),m:n.getMonth()};}
  const y=calMonth.y,m=calMonth.m;
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW=['S','M','T','W','T','F','S'];
  const startDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  const mKey=y+'-'+String(m+1).padStart(2,'0');
  const dayMap={};
  S.shows.forEach(sh=>{getShowDates(sh).forEach(ds=>{(dayMap[ds]=dayMap[ds]||[]).push(sh);});});
  let monthDays=0;
  Object.keys(dayMap).forEach(ds=>{if(ds.substring(0,7)===mKey)monthDays++;});
  let h=`<div class="cal-hdr"><button class="cal-nav-btn" onclick="calShift(-1)">&lsaquo;</button><div class="cal-title">${MN[m]} ${y}</div><button class="cal-nav-btn" onclick="calShift(1)">&rsaquo;</button></div>`;
  h+='<div class="cal-grid">';
  DOW.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++)h+='<div class="cal-cell blank"></div>';
  let conflictDays=0;
  for(let day=1;day<=daysInMonth;day++){
    const ds=`${mKey}-${String(day).padStart(2,'0')}`;
    const shows=dayMap[ds]||[];
    const conflict=shows.length>1;
    if(conflict)conflictDays++;
    let cls='cal-cell',onclick='';
    if(ds===todayStr)cls+=' today';
    if(shows.length){
      let st='possible';
      if(shows.some(s=>s.status==='completed'))st='completed';
      else if(shows.some(s=>s.confirmed||s.status==='active'))st='confirmed';
      cls+=` has-show ${st}`;
      if(conflict)cls+=' conflict';
      onclick=` onclick="go('show','${shows[0].id}')"`;
    }
    h+=`<div class="${cls}"${onclick}><div class="cal-num">${day}${conflict?' <span style="color:var(--red);font-size:10px">⚠️</span>':''}</div>`;
    shows.slice(0,2).forEach(s=>{h+=`<div class="cal-show-pill">${s.name}</div>`;});
    if(shows.length>2)h+=`<div class="cal-show-pill">+${shows.length-2} more</div>`;
    h+='</div>';
  }
  h+='</div>';
  h+=`<div class="cal-legend"><span><span class="cal-legend-dot" style="background:var(--green)"></span>Booked</span><span><span class="cal-legend-dot" style="background:var(--gold)"></span>Pending</span><span><span class="cal-legend-dot" style="background:rgba(0,210,106,0.55)"></span>Completed</span><span><span class="cal-legend-dot" style="background:var(--red)"></span>⚠️ Conflict</span></div>`;
  h+=`<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">${monthDays} show day${monthDays===1?'':'s'} in ${MN[m]}${conflictDays?` · <span style="color:var(--red);font-weight:700">${conflictDays} conflict day${conflictDays>1?'s':''}</span>`:''}</div>`;
  h+=`<button class="btn btn-ghost btn-full" style="margin-top:12px" onclick="calToday()">Jump to This Month</button>`;
  h+=`<button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="exportCalICS()">Export Shows to Calendar (.ics)</button>`;
  pg('calendar').innerHTML=h;
}

  let h=`<div class="sec-title" style="margin-bottom:4px">👥 Sales Reps</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Tap a rep for their full breakdown — shows worked, sales, and what they're owed.</div>`;
  // ---- Payouts Due board: every commission rep + flat/hourly/manual worker who is still owed money ----
  (()=>{
    const repDebts=reps.filter(r=>!r.isSelf).map(r=>({r,owed:Math.max(0,repEarned(r.id)-repPaid(r.id))})).filter(x=>x.owed>0.005);

    const grand=repDebts.reduce((t,x)=>t+x.owed,0)+workerDebts.reduce((t,x)=>t+x.owed,0);
    if(!repDebts.length&&!workerDebts.length){ if(reps.some(r=>!r.isSelf))h+=`<div class="card" style="margin-bottom:12px;border-color:rgba(0,210,106,0.3)"><div style="font-size:12px;color:var(--green);font-weight:700">✓ Everyone's paid up — no payouts due.</div></div>`; return; }
    const row=(name,sub,owed,btn)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><div style="min-width:0"><div style="font-weight:700;font-size:13px">${name}</div><div style="font-size:10px;color:var(--muted)">${sub}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span style="color:var(--gold);font-weight:800">${fmt(owed)}</span>${btn}</div></div>`;

      ${workerDebts.map(x=>row((x.w.name||'Worker').replace(/</g,'&lt;'),x.sh.name.replace(/</g,'&lt;')+' · '+(((WORKER_TYPES.find(t=>t.k===x.w.type)||{}).l)||'flat'),x.owed,`<button class="btn btn-xs btn-gold" onclick="openEditWorker('${x.sh.id}','${x.w.id}')">Pay</button>`)).join('')}

      <div class="g3" style="margin-top:8px">
        <div style="text-align:center"><div style="font-size:15px;font-weight:900;color:var(--green)">${fmt(sold)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Sold</div></div>
        <div style="text-align:center"><div style="font-size:15px;font-weight:900;color:var(--gold)">${fmt(owed)}</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase">Owed</div></div>

function saveEditPayout(shId,repId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  const rep=(S.reps||[]).find(r=>r.id===repId);
  const raw=($$('ep_amt')||{}).value;
  if(!sh.repPayout)sh.repPayout={};
  if(raw==null||raw==='')delete sh.repPayout[repId];
  else sh.repPayout[repId]=parseFloat(raw)||0;

  const paid=parseFloat(($$('ep_paid')||{}).value);
  if(paid&&paid>0&&rep){ if(!rep.payments)rep.payments=[]; rep.payments.push({id:'rp_'+Date.now(),date:new Date().toISOString().split('T')[0],amount:paid,note:note||('Payout — '+sh.name),method,showId:sh.id}); }
  mClose();saveS();toast('✅ Payout saved');renderCur();
}

function sumRepSalesForDay(day){ const p={}; PMTS.forEach(x=>p[x.key]=0); (day.repSales||[]).forEach(rs=>PMTS.forEach(x=>{p[x.key]+=parseFloat(rs[x.key])||0;})); return p; }
function saveRepSalesEntry(shId,di,repId){
  const sh=S.shows.find(s=>s.id===shId);if(!sh)return;
  const day=sh.days[di];if(!day)return;
  if(!day.repSales)day.repSales=[];
  let rs=day.repSales.find(x=>x.repId===repId);
  if(!rs){rs={repId};day.repSales.push(rs);}
  PMTS.forEach(p=>{rs[p.key]=parseFloat($$('rs_'+p.key).value)||0;});

}

function applyClaudeCmd(){
  const raw=($$('claudeCmd').value||'').trim().toUpperCase();
  if(!raw){toast('Nothing to apply!');return;}
  try{
    // INVENTORY UPDATE: INV:32oz=80,c5s=400
    if(raw.startsWith('INV:')){
      const parts=raw.replace('INV:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=Math.max(0,val);updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Updated '+updated+' inventory items!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    // ADD INVENTORY: ADD:32oz=10,c5s=50
    if(raw.startsWith('ADD:')){
      const parts=raw.replace('ADD:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=(S.inventory[sku.key]||0)+val;updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Added stock to '+updated+' items!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    // SUBTRACT INVENTORY: SOLD:32oz=5,c5s=10
    if(raw.startsWith('SOLD:')){
      const parts=raw.replace('SOLD:','').split(',');
      let updated=0;
      parts.forEach(p=>{
        const [k,v]=p.split('=');
        const key=k.trim().toLowerCase();
        const val=parseInt(v);
        const sku=SKUS.find(s=>s.key===key||s.short.toLowerCase()===key||s.name.toLowerCase().includes(key));
        if(sku&&!isNaN(val)){S.inventory[sku.key]=Math.max(0,(S.inventory[sku.key]||0)-val);updated++;}
      });
      if(updated>0){$$('claudeCmd').value='';saveS();toast('✅ Removed sold items from '+updated+' SKUs!');go('stock');}
      else{toast('No valid items found. Check the format.');}
      return;
    }
    toast('Unknown command. Start with INV:, ADD:, or SOLD:');
  }catch(e){toast('Command error: '+e.message);}
}

function restoreBackupFile(){

  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f)return;
    const rdr=new FileReader();
    rdr.onload=()=>{
      try{
        const parsed=JSON.parse(rdr.result);
        const shows=(parsed.shows||[]).length, reps=(parsed.reps||[]).length;
        if(!confirm('Restore from "'+f.name+'"?\n\nThis REPLACES everything on this device with the backup ('+shows+' shows, '+reps+' reps). Your current data will be overwritten.'))return;
        _applyStateObj(parsed); toast('✅ Restored from backup'); go('home');
      }catch(e){ toast('Restore failed — not a valid backup file.'); }
    };
    rdr.readAsText(f);
  };
  inp.click();
}

async function cloudPull(){
  if(!sb||!_cloudUser)return null;
  try{
    const{data,error}=await sb.from('app_data').select('data_value').eq('data_key','bs_state_blank').maybeSingle();
    if(error||!data)return null;
    return data.data_value;
  }catch(e){console.warn('cloudPull',e);return null;}
}
async function cloudPush(){
  if(!sb||!_cloudUser)return;
  if(!S._updatedAt)S._updatedAt=new Date().toISOString();
  setSync('syncing');
  try{
    const{error}=await sb.from('app_data').upsert({user_id:_cloudUser.id,data_key:'bs_state_blank',data_value:S,updated_at:new Date().toISOString()},{onConflict:'user_id,data_key'});
    setSync(error?'error':'synced');
    if(error)console.warn('cloudPush',error);
  }catch(e){console.warn('cloudPush',e);setSync('error');}
}
function cloudQueuePush(){
  if(!sb||!_cloudUser)return;
  clearTimeout(_cloudTimer);
  setSync('syncing');
  _cloudTimer=setTimeout(cloudPush,800);
}
function backupLocal(){
  try{
    const cur=localStorage.getItem('dd_bs_blank_v7');if(!cur)return;
    localStorage.setItem('dd_bs_blank_backup_'+Date.now(),cur);
    const keys=Object.keys(localStorage).filter(k=>k.indexOf('dd_bs_blank_backup_')===0).sort();
    while(keys.length>3)localStorage.removeItem(keys.shift());
  }catch(e){console.warn('backupLocal',e);}
}
function looksUsed(st){
  if(!st||!st.shows)return false;
  if((st.otherExpenses||[]).length)return true;
  return st.shows.some(sh=>sh.status==='completed'||(sh.days||[]).some(d=>d.morningCount!=null||d.eveningCount!=null));
}
function adoptCloud(cloud){
  backupLocal();
  cloud.v=INIT.v;
  localStorage.setItem('dd_bs_blank_v7',JSON.stringify(cloud));
  S=loadS();
  renderCur();
  setSync('synced');
}
async function cloudHydrate(){
  const cloud=await cloudPull();
  if(!cloud){await cloudPush();return;}
  if(!cloud.inventory||!cloud.shows){await cloudPush();return;}
  const localUsed=looksUsed(S),cloudUsed=looksUsed(cloud);
  if(localUsed&&!cloudUsed){await cloudPush();return;}
  if(cloudUsed&&!localUsed){adoptCloud(cloud);return;}
  const localT=S._updatedAt||'',cloudT=cloud._updatedAt||'';
  if(cloudT>localT)adoptCloud(cloud);
  else if(localT>cloudT)await cloudPush();
  else setSync('synced');
}
async function cloudInit(){
  if(!sb)return;
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(session&&session.user){_cloudUser=session.user;setSync('syncing');await cloudHydrate();}
  }catch(e){console.warn('cloudInit',e);}
}
async function cloudSignIn(){
  if(!sb){toast('Cloud sync unavailable - no connection');return;}
  const email=($$('cl_email').value||'').trim();
  const pass=$$('cl_pass').value||'';
  if(!email||!pass){toast('Enter email and password');return;}
  const btn=$$('cl_btn');if(btn){btn.disabled=true;btn.textContent='SIGNING IN…';}
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){toast(error.message||'Sign in failed');if(btn){btn.disabled=false;btn.textContent='SIGN IN';}return;}
    _cloudUser=data.user;
    toast('✅ Signed in');
    setSync('syncing');
    await cloudHydrate();
    rSettings();
    toast('✅ Cloud sync on');
  }catch(e){toast('Sign in failed');if(btn){btn.disabled=false;btn.textContent='SIGN IN';}}
}
async function cloudSignUp(){
  if(!sb){toast('Cloud sync unavailable - no connection');return;}
  const email=($$('cl_email').value||'').trim();
  const pass=$$('cl_pass').value||'';
  if(!email||!pass){toast('Enter an email and a password (6+ characters)');return;}
  if(pass.length<6){toast('Password must be at least 6 characters');return;}
  try{
    const{data,error}=await sb.auth.signUp({email,password:pass});
    if(error){toast(error.message||'Sign up failed');return;}
    if(data&&data.session&&data.user){
      _cloudUser=data.user; toast('✅ Account created'); setSync('syncing');
      await cloudHydrate(); rSettings(); toast('✅ Cloud sync on — this device\'s data is now backed up');
    } else {
      toast('✅ Account created — check your email to confirm, then tap Sign In');
    }
  }catch(e){toast('Sign up failed');}
}
async function cloudSignOut(){
  try{if(sb)await sb.auth.signOut();}catch(e){}
  _cloudUser=null;setSync('off');rSettings();
  toast('Signed out - app still works offline');
}
async function cloudSyncNow(){
  if(!_cloudUser){toast('Sign in first');return;}
  setSync('syncing');await cloudPush();rSettings();
}
function cloudCardHTML(){
  if(_cloudUser){
    const email=_cloudUser.email||'signed in';
    return `<div class="card grb"><div style="font-size:10px;color:var(--green);text-transform:uppercase;font-weight:700;margin-bottom:8px">☁️ CLOUD SYNC</div><div style="font-size:13px;margin-bottom:4px">Signed in as <strong>${email}</strong></div><div id="cl_status" style="font-size:12px;color:var(--muted);margin-bottom:10px">${syncLabel(_syncState)||'Synced ✓'}</div><div class="g2" style="gap:8px"><button class="btn btn-ghost btn-full" onclick="cloudSyncNow()">🔄 Sync Now</button><button class="btn btn-ghost btn-full" onclick="cloudSignOut()">Sign Out</button></div></div>`;
  }
  return `<div class="card bb"><div style="font-size:10px;color:var(--blue);text-transform:uppercase;font-weight:700;margin-bottom:8px">☁️ CLOUD SYNC</div><div style="font-size:12px;color:var(--muted);margin-bottom:10px">Sign in to back up your data and sync across all your devices. The app still works offline either way.</div><div class="fg"><label class="fl">EMAIL</label><input class="fi" id="cl_email" type="email" placeholder="you@email.com" autocomplete="username"></div><div class="fg"><label class="fl">PASSWORD</label><input class="fi" id="cl_pass" type="password" placeholder="••••••••" autocomplete="current-password"></div><button class="btn btn-gold btn-full" id="cl_btn" onclick="cloudSignIn()">SIGN IN</button><button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="cloudSignUp()">✨ Create Account</button><div style="font-size:11px;color:var(--muted);margin-top:8px">First time? <strong>Create Account on the device that HAS your data</strong> (it uploads automatically), then Sign In on your other devices to pull it down.</div><div id="cl_status" style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px"></div></div>`;
}

try{
  S=loadS();
  go('home');
  cloudInit();
}catch(e){
  document.body.style.cssText='background:#111;color:#fff;padding:20px;font-family:monospace';

}
